<style>

<script>
// --- セーブデータバージョン管理 ---
const SAVE_VERSION = 1;

function migrateSaveData(data, fromVersion){
  if(fromVersion < 1){
    if(data.upgrades.potionHeal === undefined) data.upgrades.potionHeal = 0;
    if(data.upgrades.relicSlots === undefined) data.upgrades.relicSlots = 0;
    if(data.upgrades.journal    === undefined) data.upgrades.journal    = false;
    if(data.stats.poisonTurns   === undefined) data.stats.poisonTurns   = 0;
    if(data.stats.chests        === undefined) data.stats.chests        = 0;
    if(data.stats.mushrooms     === undefined) data.stats.mushrooms     = 0;
    if(data.stats.veinClears    === undefined) data.stats.veinClears    = 0;
    ["runs","deaths","floors","scrap","damage","potions","goddess",
     "goldenMole","thiefMole","daigo","emerald",
     "maxScrapCarry","maxEmeraldCarry"].forEach(k => {
      if(data.stats[k] === undefined) data.stats[k] = 0;
    });
  }
  // 将来フィールドを追加する時はここに追記する
  // if(fromVersion < 2){
  //   if(data.upgrades.newField === undefined) data.upgrades.newField = 0;
  // }
  return data;
}

function loadSaveData(){
  let version = parseInt(localStorage.getItem("saveVersion")) || 0;

  let data = {
    upgrades:     JSON.parse(localStorage.getItem("upgrades") || '{"hp":0,"power":0,"potionHeal":0,"relicSlots":0,"journal":false}'),
    totalScrap:   parseInt(localStorage.getItem("totalScrap"))   || 0,
    totalEmerald: parseInt(localStorage.getItem("totalEmerald")) || 0,
    bestFloor:    parseInt(localStorage.getItem("bestFloor"))    || 1,
    items:        JSON.parse(localStorage.getItem("items")       || "[]"),
    stats:        JSON.parse(localStorage.getItem("stats")       || "{}"),
    playerName:   localStorage.getItem("playerName")             || "プレイヤー",
    seOn:         localStorage.getItem("seOn") !== "false",
  };

  if(version < SAVE_VERSION){
    data = migrateSaveData(data, version);
    localStorage.setItem("saveVersion", SAVE_VERSION);
  }

  return data;
}

// --- 永続データ読み込み ---
const saved = loadSaveData();

let state = {
  name:         saved.playerName,
  hp:           10 + saved.upgrades.hp,
  maxHp:        10 + saved.upgrades.hp,
  power:        1  + saved.upgrades.power,
  items:        saved.items,
  scrap:        0,
  totalScrap:   saved.totalScrap,
  floor:        1,
  bestFloor:    saved.bestFloor,
  log:          [],
  mode:         "home",
  upgrades:     saved.upgrades,
  lastResult:   null,
  buffs:        [],
  moleBlock:    -1,
  relicViewOpen: false,
  daigoLastFloor:    -999,
  merchantLastFloor: -999,
  relics:           [],
  pendingItem:      null,
  relicEventFloors: new Set(),
  relicChoices:     [],
  pendingRelic:     null,
  activeCrestId:    null,
  veinDepth:        0,
  veinLastGain:     0,
  veinLastEmerald:  false,
  mushroomBad:      false,
  emerald:          0,
  totalEmerald:     saved.totalEmerald,
  seOn:             saved.seOn,
  stats:            saved.stats,
  runStats: {
    floors: 0, scrap: 0, damage: 0,
    potions: 0, goddess: 0, goldenMole: 0, thiefMole: 0, daigo: 0,
    chests: 0, poisonTurns: 0, mushrooms: 0, veinClears: 0
  }
};

// --- バフ管理 ---
function applyBuff(buff){
  // 同じidがあれば上書き、なければ追加
  let idx = state.buffs.findIndex(b => b.id === buff.id);
  if(idx >= 0) state.buffs[idx] = buff;
  else state.buffs.push(buff);
}

function tickBuffs(){
  // 階層が上がった瞬間に発動・ターン消費
  state.buffs.forEach(b => {
    if(b.onTurn) b.onTurn();
    b.turns--;
  });
  // 0以下になったバフを削除
  state.buffs = state.buffs.filter(b => b.turns > 0);
}

function clearBuffs(){
  state.buffs = [];
  state.moleBlock = -1;
}

// --- 採掘力UPバフを付与する関数 ---
function applyMiningUp(turns){
  applyBuff({
    id: "miningUp",
    name: "⛏️ 採掘力UP",
    turns: turns,
    isBad: false,
    miningBonus: 1,  // +1倍（採掘量2倍）
    onTurn: null
  });
}

// --- 採掘量低下デバフを付与する関数 ---
function applyMiningDown(turns){
  applyBuff({
    id: "miningDown",
    name: "🤕 採掘量低下",
    turns: turns,
    isBad: true,
    miningPenalty: 0.5,  // ×0.5（半減）
    onTurn: null
  });
}

// --- 毒を付与する関数 ---
function applyPoison(turns){
  applyBuff({
    id: "poison",
    name: "🩸 毒",
    turns: turns,
    isBad: true,
    onTurn: () => {
      let d = Math.max(1, Math.floor(state.maxHp * 0.1));
      // 毒で死なない：HP1を必ず残す
      d = Math.min(d, state.hp - 1);
      if(d > 0){
        damage(d, true); // 毒は鋼皮の紋の軽減対象外
        state.runStats.poisonTurns++;
        addLog(`🩸 毒ダメージ ${d}`, "damage");
      }
    }
  });
}

// --- アイテム定義マスタ ---
const ITEM_DEF = {
  hp3: {
    name: "ポーション",
    get desc(){ return `HP を ${getPotionHealValue()} 回復する`; },
    usableModes: null
  },
  antidote: {
    name: "毒消し草",
    desc: "毒状態を治す",
    usableModes: null
  }
};

// --- SE（Web Audio API） ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

async function initAudio(){
  if(!audioCtx){
    audioCtx = new AudioCtx();
  }
  if(audioCtx.state !== "running"){
    try {
      await audioCtx.resume();
    } catch(e) { /* ignore */ }
  }
  // resumeしても running にならない場合、AudioContextを作り直す
  if(audioCtx.state !== "running"){
    try { audioCtx.close(); } catch(e) { /* ignore */ }
    audioCtx = new AudioCtx();
    try { await audioCtx.resume(); } catch(e) { /* ignore */ }
  }
}

// バックグラウンド復帰時：iOSではAudioContextが壊れることがあるため、
// 強制的に破棄して次回再生時に作り直させる
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "hidden" && audioCtx){
    try { audioCtx.close(); } catch(e) { /* ignore */ }
    audioCtx = null;
  }
});

// pageshow（bfcache復帰）時にも同様の処理
window.addEventListener("pageshow", (e) => {
  if(e.persisted && audioCtx){
    try { audioCtx.close(); } catch(e2) { /* ignore */ }
    audioCtx = null;
  }
});

// 採掘音：ザクッ（こもった土の音）
async function playDigSound(){
  await initAudio();
  const duration = 0.08;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const src    = audioCtx.createBufferSource();
  src.buffer   = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type  = "lowpass";
  filter.frequency.value = 800;
  const gain   = audioCtx.createGain();
  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// 回復音：ポチョン（清涼感・神秘感）
async function playHealSound(){
  await initAudio();
  const duration = 0.2;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

// 購入音：ピロリン（ゲーム風コイン）
async function playCoinSound(){
  await initAudio();
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(987.77, audioCtx.currentTime);
  osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.08);

  gain.gain.setValueAtTime(0, audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.4);
}

// エメラルド発見音：上昇アルペジオ（レア感）
async function playEmeraldSound(){
  await initAudio();
  const now = audioCtx.currentTime;
  [880, 1108, 1318, 1760].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = "triangle";
    osc.frequency.setValueAtTime(freq, now + i * 0.05);
    g.gain.setValueAtTime(0, now + i * 0.05);
    g.gain.linearRampToValueAtTime(0.2, now + i * 0.05 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.4);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(now + i * 0.05);
    osc.stop(now + i * 0.05 + 0.4);
  });
}

// ボタン選択音：ピコ（汎用ボタンSE）
async function playSelectSound(){
  await initAudio();
  const t = audioCtx.currentTime;
  const partials = [
    { ratio: 1,    vol: 1.0,  decayMult: 1.0  },
    { ratio: 3.73, vol: 0.4,  decayMult: 0.55 },
    { ratio: 7.8,  vol: 0.12, decayMult: 0.25 },
  ];
  const freq  = 1100;
  const decay = 0.3;
  const vol   = 0.25;
  partials.forEach(({ ratio, vol: v, decayMult }) => {
    const osc = audioCtx.createOscillator();
    const g   = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq * ratio * 1.004, t);
    osc.frequency.exponentialRampToValueAtTime(freq * ratio, t + 0.012);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol * v, t + 0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, t + decay * decayMult);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start(t);
    osc.stop(t + decay * decayMult + 0.05);
  });
}

// ダメージ音：ドスッ（鈍器系打撃）
async function playDamageBlunt(){
  await initAudio();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(150, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
  const bufferSize = audioCtx.sampleRate * 0.1;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for(let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const noise = audioCtx.createBufferSource();
  const nGain = audioCtx.createGain();
  noise.buffer = noiseBuffer;
  nGain.gain.setValueAtTime(0.2, t);
  nGain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
  osc.connect(g); g.connect(audioCtx.destination);
  noise.connect(nGain); nGain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.2);
  noise.start(t);
}

// --- モーダル基盤（共通） ---
function showModal(message, opts){
  let overlay = document.getElementById("modal-overlay");
  document.getElementById("modal-message").innerHTML = message;
  let yesBtn = document.getElementById("modal-yes");
  let noBtn  = document.getElementById("modal-no");
  // 古いリスナー除去のためclone
  let newYes = yesBtn.cloneNode(true);
  let newNo  = noBtn.cloneNode(true);
  yesBtn.parentNode.replaceChild(newYes, yesBtn);
  noBtn.parentNode.replaceChild(newNo, noBtn);

  if(opts.alertOnly){
    newNo.style.display = "none";
    newYes.innerText = "OK";
  } else {
    newNo.style.display = "";
    newYes.innerText = "はい";
  }

  overlay.classList.add("show");
  newYes.onclick = () => {
    overlay.classList.remove("show");
    if(opts.onYes) opts.onYes();
  };
  newNo.onclick = () => {
    overlay.classList.remove("show");
    if(opts.onNo) opts.onNo();
  };
}

function showAlert(message){
  showModal(message, { alertOnly: true });
}

function showConfirm(message, onYes){
  showModal(message, { onYes });
}

const UNLOCK_CHECKS = {
  beginner: () => state.bestFloor >= 10,
  mining:   () => state.bestFloor >= 50,
  steel:    () => state.bestFloor >= 50,
  detect:   () => state.bestFloor >= 50,

  skilldig: () => state.stats.veinClears >= 1,
  // 他の紋は今後追加
};

// 解放チェック：新規解放されたIDの配列を返す
function checkUnlocks(){
  let newlyUnlocked = [];
  for(let id in UNLOCK_CHECKS){
    if(!UNLOCKED_CRESTS.has(id) && UNLOCK_CHECKS[id]()){
      UNLOCKED_CRESTS.add(id);
      newlyUnlocked.push(id);
    }
  }
  if(newlyUnlocked.length > 0){
    localStorage.setItem("unlockedCrests", JSON.stringify([...UNLOCKED_CRESTS]));
  }
  return newlyUnlocked;
}

  return `<button onclick="buyRelicSlot()" style="${shopStyle}height:auto;padding:12px 8px;">紋スロット拡張<br><span ${descStyle}>${cur}枠 → ${cur+1}枠</span><br>${SVG_ICONS.emerald}<span style="color:#58d68d;font-size:26px;">${cost}</span></button>`;

<div style="color:#888;margin:6px 0;">[ 貴重品 ]</div>

  ? `<button disabled style="border-color:#666;color:#666;background:transparent;opacity:0.5;width:100%;height:auto;padding:12px 8px;">採掘日誌<br><span style="font-size:18px;">購入済み</span></button>`

}

// --- 保存ヘルパー ---
function saveAll() {
  localStorage.setItem("totalScrap",   state.totalScrap);
  localStorage.setItem("totalEmerald", state.totalEmerald);
  localStorage.setItem("upgrades",     JSON.stringify(state.upgrades));
  localStorage.setItem("bestFloor",    state.bestFloor);
  localStorage.setItem("items",        JSON.stringify(state.items));
  localStorage.setItem("stats",        JSON.stringify(state.stats));
  localStorage.setItem("playerName",   state.name);
}

// ランの統計を永続に加算してリセット
function commitStats(died, carry=0){
  state.stats.runs++;
  if(died) state.stats.deaths++;
  state.stats.floors      += state.runStats.floors;
  state.stats.scrap       += carry;
  state.stats.damage      += state.runStats.damage;
  state.stats.potions     += state.runStats.potions;
  state.stats.goddess     += state.runStats.goddess;
  state.stats.goldenMole  += state.runStats.goldenMole;
  state.stats.thiefMole   += state.runStats.thiefMole;
  state.stats.daigo       += state.runStats.daigo;
  state.stats.chests      += state.runStats.chests;
  state.stats.poisonTurns += state.runStats.poisonTurns;
  state.stats.mushrooms   += state.runStats.mushrooms;
  state.stats.veinClears  += state.runStats.veinClears;
  resetRunStats();
}

// --- コスト ---
function getHpCost()      { return Math.floor(50  + state.upgrades.hp    * state.upgrades.hp    * 2); }
function getPowerCost()   { return Math.floor(100 + state.upgrades.power * state.upgrades.power * 3); }
function getPotionHealCost() { return Math.floor(1000 * Math.pow(2.2, state.upgrades.potionHeal)); }
function getPotionHealValue(){ return 3 + state.upgrades.potionHeal; }

// --- HP処理 ---
function damage(d, ignoreArmor=false){
  // 鋼皮の紋：毒以外のダメージを2軽減（最低1）
  if(!ignoreArmor && state.relics.some(r => r.id === "steel")){
    d = Math.max(1, d - 2);
  }
  let actual = Math.min(d, state.hp);
  state.hp = Math.max(0, state.hp - d);
  state.runStats.damage += actual;
}
function heal(v)  { state.hp = Math.min(state.maxHp, state.hp + v); }

// --- ログテキスト色付け ---
function colorizeLog(text, type){
  // アイテム名を黄緑に
  Object.values(ITEM_DEF).forEach(def => {
    text = text.split(def.name).join(
      `<span style="color:#aaffaa;font-weight:bold;">${def.name}</span>`);
  });
  // ダメージ数値を赤に（「X ダメージ」）
  text = text.replace(/(\d+)( ダメージ)/g,
    '<span style="color:#f55;font-weight:bold;">$1</span>$2');
  // スクラップ数値をオレンジに（「スクラップ +X」の形のみ）、前にSVGアイコン挿入
  text = text.replace(/(スクラップ )(\+[\d,]+)/g,
    `$1${SVG_ICONS.scrap}<span style="color:#ffcc66;font-weight:bold;">$2</span>`);
  // エメラルド数値を緑に
  text = text.replace(/(エメラルド )(\+[\d,]+)/g,
    `$1${SVG_ICONS.emerald}<span style="color:#58d68d;font-weight:bold;">$2</span>`);
  // HP回復を黄緑に（全タイプ共通）
  text = text.replace(/(HP\+\d+|HP \+\d+)/g,
    '<span style="color:#aaff66;font-weight:bold;">$1</span>');
  // 単独のスクラップ数値（マイナス時など、+なしのもの）をオレンジに
  text = text.replace(/スクラップ ([\d,]+)(?![\d])/g,
    'スクラップ <span style="color:#ffcc66;font-weight:bold;">$1</span>');
  return text;
}

// --- 絵文字取得 ---
function getEmoji(text, type){
  // テキスト優先チェック（型より先に）
  if(text.includes("金モグラ"))        return SVG_ICONS.goldenMole;
  if(text.includes("泥棒モグラ"))      return SVG_ICONS.thiefMole;
  if(type==="divider")     return text.includes("女神") ? SVG_ICONS.goddess : SVG_ICONS.door;
  if(type==="damage")      return text.includes("毒") ? "🩸" : "💥";
  if(type==="scrap")       return "⛏️";
  if(type==="heal")        return "💤";
  if(type==="loss")        return "🕳️";
  if(type==="sub")         return "";
  if(text.includes("採掘開始"))     return "⛏️";
  if(text.includes("コンテナ"))     return "📦";
  if(text.includes("鉱脈"))         return SVG_ICONS.vein;
  if(text.includes("キノコ"))       return SVG_ICONS.mushroom;
  if(text.includes("帰還"))         return "🏠";
  if(text.includes("HPが0"))        return "💀";
  if(text.includes("一休み"))       return SVG_ICONS.campfire;
  if(text.includes("亀裂"))         return "🕳️";
  if(text.includes("有毒ガス"))      return "🌫️";
  if(text.includes("暗闇で岩"))      return "🪨";
  if(text.includes("足を滑らせ"))    return "🧊";
  if(text.includes("手首を痛め"))    return "🤕";
  if(text.includes("コウモリ"))     return "🦇";
  if(text.includes("女神"))         return SVG_ICONS.goddess;
  if(text.includes("加護"))          return SVG_ICONS.goddess;
  if(text.includes("DAIGO"))         return "👤";
  if(text.includes("商人"))          return SVG_ICONS.merchant;
  return "📋";
}

// --- ログ ---
// state.log = [ { floor, lines: [{text, type, emoji}] }, ... ]
// subはその階の最新エントリのlinesに追加、それ以外は新エントリ

function addLog(text, type="normal"){
  let emoji = getEmoji(text, type);

  if(type === "sub"){
    // 最新エントリのlinesに追加
    if(state.log.length > 0){
      state.log[0].lines.push({text, type, emoji});
    }
    return;
  }

  // 新しい階層エントリを先頭に追加
  let entry = {
    floor: state.floor,
    type,           // エントリ全体の代表タイプ（アイコン・色に使う）
    lines: [{text, type, emoji}]
  };
  state.log.unshift(entry);
  state.log = state.log.slice(0, 10); // 10階層分保持
}

// フロアバッジHTML生成
function floorBadgeHTML(floor){
  let extra = "";
  if(floor % 30 === 0)                                        extra = "floor-goddess";
  else if(floor % 10 === 0)                                   extra = "floor-return";
  else if(floor === 15 || (floor > 1 && (floor-1) % 50 === 0)) extra = "floor-relic";
  return `<div class="floor-badge ${extra}">${floor}F</div>`;
}

function useItem(index){
  let item = state.items[index];
  let def  = ITEM_DEF[item.effect];
  if(!def){ return; }

  // 効果発動
  if(item.effect === "hp3"){
    let v = getPotionHealValue();
    heal(v);
    playSE("heal");
    state.runStats.potions++;
    addLog(`ポーションを使った！ HP +${v}`, "scrap");
  } else if(item.effect === "antidote"){
    let idx = state.buffs.findIndex(b => b.id === "poison");
    if(idx >= 0){
      state.buffs.splice(idx, 1);
      playSE("heal");
      addLog("毒消し草を使った！ 毒が治った", "heal");
    } else {
      addLog("毒消し草を使った（毒状態ではなかった）", "normal");
    }
  }

  // 消費して上詰め
  state.items.splice(index, 1);
  saveAll();
  state.mode = prevMode;
  render();
}

function discardItem(index){
  let item = state.items[index];
  showConfirm(`「${item.name}」を本当に捨てますか？`, () => {
    state.items.splice(index, 1);
    saveAll();
    render();
  });
}

// --- 採掘量計算 ---
function calcScrap(){
  let bonus    = Math.floor((state.floor-1)/10) + 1;
  let base     = state.power * bonus;
  let variance = Math.floor(base * (Math.random() - 0.5) * 0.14);  // ±7%
  return Math.max(1, base + variance);
}

// --- 採掘倍率計算 ---
function getMiningMultiplier(){
  // バフ：(1 + miningBonus合計)
  let bonus = state.buffs
    .filter(b => b.miningBonus)
    .reduce((sum, b) => sum + b.miningBonus, 0);
  // デバフ：miningPenalty の積算（0.5なら半減）
  let penalty = state.buffs
    .filter(b => b.miningPenalty)
    .reduce((prod, b) => prod * b.miningPenalty, 1);
  return (1 + bonus) * penalty;
}

// --- イベント発生条件マスタ ---
function EVENT_COND(){
  return {
    lowHp:      state.hp / state.maxHp <= 0.25,
    highHp:     state.hp / state.maxHp >= 0.75,
    isPoisoned: state.buffs.some(b => b.id === "poison"),
    miningUp:   state.buffs.some(b => b.id === "miningUp"),
    miningDown: state.buffs.some(b => b.id === "miningDown"),
    itemEmpty:  state.items.length === 0,
    itemFull:   state.items.length >= 5,
    hasPotion:  state.items.some(i => i.effect === "hp3"),
    richScrap:  state.scrap >= 200,
    poorScrap:  state.scrap === 0,
    hasEmerald: state.emerald > 0,
  };
}

// --- 探索 ---
function next(){
  state.floor++;
  state.runStats.floors++;

  // バフ・デバフのターン処理（階層上昇時）
  tickBuffs();
  if(state.hp <= 0){ checkDeath(); render(); return; }

  // 紋獲得イベント：15階 または 51,101,151...階
  let isRelicFloor = state.floor === 15 || (state.floor > 1 && (state.floor - 1) % 50 === 0);
  if(isRelicFloor && !state.relicEventFloors.has(state.floor)){
    state.relicEventFloors.add(state.floor);
    let pool = CREST_MASTER.filter(c =>
      UNLOCKED_CRESTS.has(c.id) &&
      !state.relics.some(r => r.id === c.id)
    );
    if(pool.length > 0){
      let shuffled = [...pool].sort(() => Math.random() - 0.5);
      state.relicChoices = shuffled.slice(0, 3);
      state.mode = "event_relic_pick";
      let msg = state.floor === 15
        ? "深淵に挑みし者よ…紋をその身に纏い、奈落を目指せ"
        : "紋を発見した！";
      addLog(msg);
      render();
      return;
    }
  }

  if(state.floor % 30 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\n女神像がある…`, "divider");
    state.mode = "event_goddess";
    render();
    return;
  }

  if(state.floor % 10 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\nスクラップを半分支払えば帰還できそうだ`, "divider");
    state.mode = "return";
    render();
    return;
  }

  // --- 軽(70%) / 重(30%) の2段階抽選 ---
  const LIGHT_EVENTS = [
    // 落石 19
    { w: 19, fn: () => {
      playSE("damage");
      let d = Math.floor(Math.random()*3) + 1 + floorDmgBonus();
      damage(d);
      addLog(`落石！ ${d} ダメージ`, "damage");
    }},
    // 一休み 9
    { w: 9, fn: () => {
      let h = Math.floor(Math.random()*2) + 1 + floorHealBonus();
      heal(h);
      playSE("heal");
      addLog(`一休みした HP+${h}`, "heal");
    }},
    // 亀裂 10
    { w: 10, fn: () => {
      playSE("select");
      let lost = Math.min(calcScrap(), state.scrap);
      state.scrap = Math.max(0, state.scrap - lost);
      addLog(`亀裂の隙間にスクラップを落としてしまった スクラップ -${lost.toLocaleString()}`, "loss");
    }},
    // 有毒ガス 3
    { w: 3, fn: () => {
      playSE("select");
      applyPoison(2);
      addLog("有毒ガスが充満している！ 毒2ターン", "damage");
    }},
    // 暗闇で岩 9
    { w: 9, fn: () => {
      playSE("damage");
      let base = Math.floor(Math.random()*3) + 1 + floorDmgBonus();
      let d = Math.max(1, Math.floor(base / 2));
      damage(d);
      addLog(`暗闇で岩にぶつかった！ ${d} ダメージ`, "damage");
    }},
    // 足を滑らせた 8
    { w: 8, fn: () => {
      playSE("damage");
      let lost = Math.max(0, Math.floor(Math.floor(calcScrap() * 0.1) / 2));
      state.scrap = Math.max(0, state.scrap - lost);
      let d = Math.max(1, Math.ceil(state.maxHp * 0.05));
      damage(d);
      addLog(`足を滑らせた！`, "damage");
      addLog(`スクラップを ${lost.toLocaleString()} 落とした / ${d} ダメージを受けた`, "sub");
    }},
    // 手首を痛めた 7
    { w: 7, fn: () => {
      playSE("select");
      applyMiningDown(3);
      addLog("採掘中に手首を痛めた… 採掘量低下（3ターン）", "damage");
    }},
    // DAIGO 5（遭遇から+20階は再遭遇しない）
    { w: 5,
      condition: () => state.floor - state.daigoLastFloor >= 20,
      fn: () => {
        const DAIGO_TIPS = [
          "キノコは食べると毒になることがあるから気をつけて",
          "コンテナみつけるとつい開けちゃうよねぇ",
          "毒って苦しいけど毒ダメージで死ぬことはないらしいよ",
          "女神像に祈れば無事に帰れるみたいだよ",
          "階層が深くなるほど取れるスクラップも多くなるみたいだよ",
          "こないだコンテナからポーション拾っちゃった",
          "キノコ食べると稀にパワーアップするとか…ホントかな？",
          "30階以降はエメラルドも掘れるらしいよ。まぁ滅多にみつからないんだけどね",
          "採掘中に授かった紋は1度帰還すると消えてしまうらしいよ。次また新しく授けてもらわないとね",
          "鉱脈からもエメラルドは掘れるみたいだね",
        ];
        playSE("select");
        let tip = DAIGO_TIPS[Math.floor(Math.random() * DAIGO_TIPS.length)];
        state.daigoLastFloor = state.floor;
        state.runStats.daigo++;
        state.mode = "event_daigo";
        addLog(`採掘者DAIGOに出会った！`);
        state.log[0].tip = tip;
        // 友誼の紋：HP20%回復
        if(state.relics.some(r => r.id === "friend")){
          let h = Math.ceil(state.maxHp * 0.2);
          heal(h);
          playSE("heal");
          state.log[0].friendHeal = h;
          addLog(`友誼の紋が輝いた！ HP +${h} 回復`, "sub");
        }
      }
    },
    // モグラ 1%（30階ブロック内で1回まで）
    { w: 1,
      condition: () => {
        let block = Math.floor((state.floor - 1) / 30);
        return state.moleBlock !== block;
      },
      fn: () => {
        playSE("select");
        let block = Math.floor((state.floor - 1) / 30);
        state.moleBlock = block;
        if(Math.random() < 0.5){
          // 金モグラ
          let gain = Math.floor(state.scrap / 2);
          state.scrap += gain;
          state.runStats.goldenMole++;
          addLog(`金モグラだ！ スクラップ +${gain.toLocaleString()}`, "scrap");
        } else {
          // 泥棒モグラ
          let lost = Math.floor(state.scrap / 2);
          state.scrap = Math.max(0, state.scrap - lost);
          state.runStats.thiefMole++;
          addLog(`泥棒モグラだ！ スクラップ -${lost.toLocaleString()}`, "loss");
        }
      }
    },
  ];

  const HEAVY_EVENTS = [
    { w: 15, fn: () => { state.mode = "event";          addLog("コンテナを発見した！"); }},
    { w: 40, fn: () => {
      state.veinDepth = 0;
      state.mode = "event_vein";
      addLog("鉱脈だ！だけど地盤が脆そうだ…");
    }},
    { w: 40, fn: () => { playSE("select"); state.mushroomBad = false; state.mode = "event_mushroom"; addLog("謎のキノコだ！"); }},
    { w: 30, fn: () => { playSE("select"); state.mode = "event_bat";      addLog("コウモリの群れだ！"); }},
    { w: 10,
      condition: () =>
        state.items.length <= 4 &&
        state.scrap >= 10 &&
        state.floor - state.merchantLastFloor >= 15,
      fn: () => {
        playSE("select");
        state.merchantLastFloor = state.floor;
        state.mode = "event_merchant";
        addLog("謎の商人が現れた！");
      }
    },
  ];

  // イベント比率定数（紋や仕様変更で調整可能）
  const hasDetect = state.relics.some(r => r.id === "detect");
  const RATE_MINING = hasDetect ? 0.30 : 0.40;
  const RATE_LIGHT  = hasDetect ? 0.20 : 0.30;
  const RATE_HEAVY  = hasDetect ? 0.50 : 0.30;

  const roll = Math.random();

  if(roll < RATE_MINING){
    // 採掘イベント（固定）
    (() => {
      let g = Math.floor(calcScrap() * getMiningMultiplier());
      // 初心の紋：+1固定加算
      if(state.relics.some(r => r.id === "beginner")) g += 1;
      // 採掘の紋：floor(採掘力/2) + floor(階数/20) を加算
      if(state.relics.some(r => r.id === "mining")){
        g += Math.floor(state.power / 2) + Math.floor(state.floor / 20);
      }
      // 低HP（25%以下）時：15%の確率で採掘ペナルティ（スクラップ30%減）
      let lowHpPenalty = EVENT_COND().lowHp && Math.random() < 0.15;
      if(lowHpPenalty){
        let penalty = Math.floor(g * 0.3);
        g -= penalty;
      }
      state.scrap += g;
      // エメラルドドロップ判定
      let dropRate = getEmeraldDropRate();
      if(dropRate > 0 && Math.random() < dropRate){
        state.emerald++;
        state.runStats.emerald++;
        playSE("emerald");
        addLog(`採掘した スクラップ +${g.toLocaleString()} エメラルド +1`, "scrap");
      } else {
        playSE("dig");
        addLog(`採掘した スクラップ +${g.toLocaleString()}`, "scrap");
      }
      if(lowHpPenalty){
        addLog(`疲れて採掘が捗らない…`, "sub");
      }
      // 高HP（75%以上）時：15%の確率で採掘ボーナス
      if(EVENT_COND().highHp && Math.random() < 0.15){
        let bonus = Math.max(1, Math.floor(g * 0.3));
        state.scrap += bonus;
        addLog(`採掘の調子が良い！追加 スクラップ +${bonus.toLocaleString()}`, "sub");
      }
    })();
    checkDeath();
    render();
  } else if(roll < RATE_MINING + RATE_LIGHT){
    // 軽イベント：condition対応重み付き抽選
    let avail = LIGHT_EVENTS.filter(e => !e.condition || e.condition());
    if(avail.length === 0) avail = LIGHT_EVENTS.filter(e => !e.condition);
    let totalW = avail.reduce((s, e) => s + e.w, 0);
    let pick = Math.random() * totalW;
    let ev = avail[avail.length - 1];
    for(let e of avail){ pick -= e.w; if(pick <= 0){ ev = e; break; } }
    ev.fn();
    checkDeath();
    render();
  } else {
    // 重イベント：condition対応重み付き抽選
    let availH = HEAVY_EVENTS.filter(e => !e.condition || e.condition());
    if(availH.length === 0) availH = HEAVY_EVENTS.filter(e => !e.condition);
    let totalHW = availH.reduce((s, e) => s + e.w, 0);
    let pickH = Math.random() * totalHW;
    let ev = availH[availH.length - 1];
    for(let e of availH){ pickH -= e.w; if(pickH <= 0){ ev = e; break; } }
    ev.fn();
    if(state.mode !== "explore"){ render(); return; }
    checkDeath();
    render();
  }
}

// --- コンテナ ---
function openChest(){
  state.runStats.chests++;
  let r = Math.random();
  if(r < 0.60){
    // スクラップ 60%
    let g = calcScrap() * 3;
    state.scrap += g;
    addLog(`資源を発見！ スクラップ +${g.toLocaleString()}`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  } else if(r < 0.70){
    // ポーション 10%
    let newItem = { name: "ポーション", effect: "hp3" };
    if(state.items.length < 5){
      state.items.push(newItem);
      saveAll();
      addLog("ポーションを発見！", "sub");
      state.mode = "explore";
    } else {
      state.pendingItem = newItem;
      addLog("ポーションを発見！ でも手持ちがいっぱいだ…", "sub");
      state.mode = "event_item_full";
    }
  } else if(r < 0.85){
    // 空っぽ 15%
    addLog("空っぽだった…", "sub");
    state.mode = "explore";
  } else {
    // 罠 15%
    let d = Math.ceil(state.maxHp * 0.2);
    damage(d);
    playSE("damage");
    addLog(`罠だった！ ${d} ダメージ`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  }
  render();
}

// --- 手持ちいっぱい：アイテム選択破棄 ---
function renderItemFullEvent(){
  let a = document.getElementById("actions");
  let allItems = [...state.items, state.pendingItem]; // 手持ち5個＋新規1個

  let label = document.createElement("div");
  label.style.cssText = "color:#aaa;font-size:22px;margin:4px 8px;width:100%;text-align:center;";
  label.innerText = "捨てるアイテムを選んでください";
  a.appendChild(label);

  allItems.forEach((item, i) => {
    let def = ITEM_DEF[item.effect];
    let wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;align-items:center;gap:8px;width:100%;margin:4px 0;";

    let info = document.createElement("div");
    info.style.cssText = "flex:1;font-size:24px;color:#aaffaa;";
    let isNew = (i === allItems.length - 1);
    info.innerHTML = `<b>${item.name}</b>${isNew ? ' <span style="color:#0ff;font-size:18px;">NEW</span>' : ""}`;

    let desc = document.createElement("div");
    desc.style.cssText = "flex:2;font-size:20px;color:#888;text-align:center;";
    desc.innerText = def ? def.desc : "";

    let dropBtn = document.createElement("button");
    dropBtn.style.cssText = "min-width:100px;max-width:120px;font-size:22px;padding:10px 0;border-color:#f55;color:#f55;background:rgba(245,85,85,0.1);";
    dropBtn.innerText = "捨てる";
    dropBtn.onclick = () => dropAndKeep(i, allItems);

    wrap.appendChild(info);
    wrap.appendChild(desc);
    wrap.appendChild(dropBtn);
    a.appendChild(wrap);
  });
}

function dropAndKeep(dropIndex, allItems){
  // 捨てたアイテムを除いた5個を装備
  let kept = allItems.filter((_, i) => i !== dropIndex);
  state.items = kept;
  state.pendingItem = null;
  saveAll();
  let dropped = allItems[dropIndex];
  addLog(`${dropped.name} を捨てた`, "sub");
  state.mode = "explore";
  render();
}

// --- コウモリイベント ---
function calcBatLost(){
  return state.scrap > 0 ? Math.max(1, Math.floor(state.scrap * 0.1)) : 0;
}

function renderBatEvent(){
  let a = document.getElementById("actions");
  let lost = calcBatLost();

  // 「音を立てて気をそらす」ボタン
  let distractBtn = document.createElement("button");
  distractBtn.innerHTML = `音を立てて気をそらす<br><span style="font-size:22px;color:#ffcc66;">スクラップ -${lost}</span>`;
  let riskS = BTN_STYLES.risk;
  let skipS = BTN_STYLES.skip;
  if(state.scrap <= 0){
    distractBtn.style.borderColor = skipS.color;
    distractBtn.style.color       = skipS.color;
    distractBtn.style.background  = skipS.bg;
    distractBtn.disabled = true;
    distractBtn.style.opacity = "0.4";
  } else {
    distractBtn.style.borderColor = riskS.color;
    distractBtn.style.color       = riskS.color;
    distractBtn.style.background  = riskS.bg;
    distractBtn.style.boxShadow   = `0 0 10px ${riskS.color}66`;
    distractBtn.onclick = batDistract;
  }
  a.appendChild(distractBtn);

  // 「無理やり通る」ボタン（danger）
  let forceBtn = document.createElement("button");
  forceBtn.innerText = "無理やり通る";
  let dangerS = BTN_STYLES.danger;
  forceBtn.style.borderColor = dangerS.color;
  forceBtn.style.color       = dangerS.color;
  forceBtn.style.background  = dangerS.bg;
  forceBtn.style.boxShadow   = `0 0 10px ${dangerS.color}66`;
  forceBtn.onclick = batForce;
  a.appendChild(forceBtn);
}

function batDistract(){
  let lost = calcBatLost();
  state.scrap = Math.max(0, state.scrap - lost);
  addLog(`スクラップ ${lost.toLocaleString()} を投げて気をそらした`, "sub");
  state.mode = "explore";
  render();
}

function batForce(){
  if(Math.random() < 0.40){
    addLog("うまく切り抜けられた！", "sub");
  } else {
    let d = Math.ceil(state.maxHp * 0.1);
    damage(d);
    playSE("damage");
    applyPoison(3);
    addLog(`コウモリに襲われた！ ${d} ダメージ＋毒3ターン`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 紋獲得イベント ---
function renderRelicPickEvent(){
  let a = document.getElementById("actions");
  a.style.flexWrap = "wrap";

  let row = document.createElement("div");
  row.style.cssText = "display:flex;justify-content:center;gap:8px;width:100%;";

  state.relicChoices.forEach(c => {
    let b = document.createElement("button");
    b.innerText = c.name;
    b.style.cssText = `border-color:${c.color};color:${c.color};background:rgba(${c.rgb},0.1);box-shadow:0 0 10px ${c.color}66;flex:1;min-width:0;max-width:none;margin:0;`;
    b.onclick = () => pickRelic(c);
    row.appendChild(b);
  });
  a.appendChild(row);

  let skipRow = document.createElement("div");
  skipRow.style.cssText = "display:flex;justify-content:center;width:100%;margin-top:8px;";
  let skipBtn = document.createElement("button");
  skipBtn.innerText = "どれも選ばない";
  skipBtn.style.cssText = "border-color:#888;color:#888;background:rgba(136,136,136,0.1);min-width:180px;max-width:260px;";
  skipBtn.onclick = skipRelic;
  skipRow.appendChild(skipBtn);
  a.appendChild(skipRow);
}

function pickRelic(crest){
  if(state.relics.length < getRelicSlotCount()){
    state.relics.push(crest);
    addLog(`『${crest.name}』を装備した`, "sub");
    state.relicChoices = [];
    state.mode = "explore";
    render();
  } else {
    // スロット満タン → 入れ替え選択モードへ
    state.pendingRelic = crest;
    state.relicChoices = [];
    state.mode = "event_relic_swap";
    render();
  }
}

function skipRelic(){
  addLog("紋を見送った", "sub");
  state.relicChoices = [];
  state.mode = "explore";
  render();
}

function renderRelicSwapEvent(){
  let a = document.getElementById("actions");
  state.relics.forEach((r, i) => {
    let b = document.createElement("button");
    b.innerText = r.name;
    b.style.borderColor = r.color;
    b.style.color       = r.color;
    b.style.background  = `rgba(${r.rgb},0.1)`;
    b.style.boxShadow   = `0 0 10px ${r.color}66`;
    b.onclick = () => swapRelic(i);
    a.appendChild(b);
  });
  btn("やめる", cancelSwap, "skip");
}

function swapRelic(index){
  let old = state.relics[index];
  state.relics[index] = state.pendingRelic;
  addLog(`『${old.name}』を外し、『${state.pendingRelic.name}』を装備した`, "sub");
  state.pendingRelic = null;
  state.mode = "explore";
  render();
}

function cancelSwap(){
  addLog(`『${state.pendingRelic.name}』を見送った`, "sub");
  state.pendingRelic = null;
  state.mode = "explore";
  render();
}

function renderMerchantEvent(){
  let price = Math.max(1, Math.floor(state.scrap * 0.2));
  let canBuy = state.scrap >= price && state.items.length < 5;
  let b = document.createElement("button");
  b.innerHTML = `ポーション<br><span style="font-size:22px;">${SVG_ICONS.scrap}<span style="color:#ffcc66;">${price.toLocaleString()}</span></span>`;
  let s = canBuy ? BTN_STYLES.risk : BTN_STYLES.skip;

  b.style.background  = s.bg;
  b.style.boxShadow   = `0 0 10px ${s.color}66`;

  b.disabled          = !canBuy;
  if(canBuy) b.onclick = () => { playSE("coin"); buyFromMerchant(price); };
  document.getElementById("actions").appendChild(b);

}

function buyFromMerchant(price){
  state.scrap -= price;

  if(state.items.length < 5){
    state.items.push(newItem);
    saveAll();
    addLog(`ポーションを ${price.toLocaleString()} で購入した`, "sub");
  }
  state.mode = "explore";
  render();
}

function ignoreMerchant(){

}

const VEIN_PARAMS = [
  { collapse:0.20, mult:1.5, dmgCoef:1  },
  { collapse:0.40, mult:2.5, dmgCoef:2  },
  { collapse:0.60, mult:4.0, dmgCoef:4  },
  { collapse:0.80, mult:6.0, dmgCoef:6  },
];

function renderVeinEvent(){
  let depth = state.veinDepth;
  if(depth === 0){
    btn("掘る", digVein, "risk", null);
  } else {
    let label = depth < 4 ? "もう1回掘る" : null;
    if(label) btn(label, digVein, "risk", null);
    btn("やめる", leaveVein, "skip");
  }
}

function digVein(){
  let depth = state.veinDepth;
  let p = VEIN_PARAMS[Math.min(depth, 3)];
  let collapseRate = p.collapse;
  // 巧掘の紋：崩落確率を半減
  if(state.relics.some(r => r.id === "skilldig")){
    collapseRate = collapseRate * 0.5;
  }

  if(Math.random() < collapseRate){
    // 崩落
    let tier = Math.floor((state.floor - 1) / 10) + 1;
    let d = tier * p.dmgCoef;
    damage(d);
    playSE("damage");
    state.veinLastEmerald = false;
    addLog(`地盤が崩れた！ ${d} ダメージ`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  } else {
    // 成功（前回獲得量以上を保証）
    let g = Math.max(state.veinLastGain, Math.floor(calcScrap() * getMiningMultiplier() * p.mult));
    state.scrap += g;
    state.veinLastGain = g;
    // エメラルドドロップ判定（1回目=depth0は0%、2回目以降は倍率適用）
    const veinEmeraldMult = [0, 1.0, 1.5, 2.0];
    let baseRate = getEmeraldDropRate();
    let emeraldRate = baseRate * (veinEmeraldMult[Math.min(state.veinDepth, 3)]);
    let gotEmerald = emeraldRate > 0 && Math.random() < emeraldRate;
    state.veinLastEmerald = gotEmerald;
    if(gotEmerald){
      state.emerald++;
      state.runStats.emerald++;
      playSE("emerald");
      addLog(`鉱脈を掘り当てた！ スクラップ +${g.toLocaleString()} エメラルド +1`, "sub");
    } else {
      playSE("dig");
      addLog(`鉱脈を掘り当てた！ スクラップ +${g.toLocaleString()}`, "sub");
    }
    state.veinDepth++;
    // 4回目終了 or 続行
    if(state.veinDepth >= 4){
      state.runStats.veinClears++;
      addLog("この鉱脈を掘りつくした！", "sub");
      state.mode = "explore";
    }
    // 4回未満なら event_vein のまま→renderVeinEventがボタンを描画
  }
  render();
}

function leaveVein(){
  addLog("鉱脈から引き上げた", "sub");
  state.veinLastGain = 0;
  state.veinLastEmerald = false;
  state.mode = "explore";
  render();
}

// --- キノコイベント ---
function eatMushroom(){
  state.runStats.mushrooms++;
  state.mushroomBad = false;  // 毎回リセット
  let r = Math.random();
  let isBad = false;
  if(r < 0.40){
    // 毒 40%
    isBad = true;
    applyPoison(1);
    addLog("苦い！ 毒を受けた（1ターン）", "sub");
  } else if(r < 0.80){
    // 回復 40%
    let h = 3 + floorHealBonus();
    heal(h);
    playSE("heal");
    addLog(`甘い香り… HP +${h} 回復した`, "sub");
  } else if(r < 0.90){
    // 採掘力UP 10%
    applyMiningUp(5);
    addLog("不思議な胞子を吸い込んだ… 採掘力UP！（5ターン）", "sub");
  } else if(r < 0.95){
    // 錯乱：階層戻り 5%
    isBad = true;
    let back = Math.min(2, state.floor - 1);
    state.floor -= back;
    addLog(`錯乱した！ ${back}階層戻された`, "sub");
  } else {
    // 錯乱：スクラップ破棄 5%
    isBad = true;
    let lost = Math.floor(state.scrap * 0.1);
    state.scrap = Math.max(0, state.scrap - lost);
    addLog(`錯乱した！ スクラップ ${lost.toLocaleString()} をばらまいた`, "sub");
  }
  state.mushroomBad = isBad;
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 死亡 ---
function checkDeath(){
  if(state.hp <= 0){
    addLog("HPが0になった…", "sub");
    state.mode = "dead";
  }
}

// --- 帰還 ---
function confirmReturn(){
  showConfirm("本当に帰還しますか？<br>（スクラップの半分を持ち帰ります）", () => {
    doReturn();
  });
}

function doReturn(){
  let carry = Math.floor(state.scrap / 2);
  state.totalScrap += carry;
  let emeraldCarry = state.emerald;
  state.totalEmerald += emeraldCarry;
  state.emerald = 0;
  let newBest = state.floor > state.bestFloor;
  if(newBest) state.bestFloor = state.floor;
  commitStats(false, carry);
  state.stats.emerald += emeraldCarry;
  if(carry > state.stats.maxScrapCarry) state.stats.maxScrapCarry = carry;
  if(emeraldCarry > state.stats.maxEmeraldCarry) state.stats.maxEmeraldCarry = emeraldCarry;
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: true, floor: state.floor, carry, emeraldCarry, newBest, unlocks };
  state.mode = "result";
  render();
}

function forceReturn(){
  state.emerald = 0;
  let newBest = state.floor > state.bestFloor;
  if(newBest) state.bestFloor = state.floor;
  commitStats(true);
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: false, floor: state.floor, carry: 0, emeraldCarry: 0, newBest, unlocks };
  state.mode = "result";
  render();
}

function goHome(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  state.lastResult = null;
  state.activeCrestId = null;
  state.relicViewOpen = false;
  relicPrevMode = "home";
  let tooltipEl = document.getElementById("crest-tooltip");
  if(tooltipEl) tooltipEl.style.display = "none";
  let eventEl = document.getElementById("current-event");
  if(eventEl) eventEl.style.display = "";
  document.getElementById("log").classList.remove("relic-scroll");
  clearBuffs();
  state.mode  = "home";
  render();
}

// --- 女神像イベント ---
function goddessHeal(){
  state.runStats.goddess++;
  let h = Math.max(5, Math.ceil(state.maxHp * 0.4));
  heal(h);
  playSE("heal");
  addLog(`女神の加護！ HP +${h} 回復した`, "heal");
  state.mode = "explore";
  render();
}

function confirmGoddessReturn(){
  showConfirm("本当に帰還しますか？<br>（スクラップを全額持ち帰ります）", () => {
    goddessReturn();
  });
}

function goddessReturn(){
  state.runStats.goddess++;
  let carry = state.scrap;
  state.totalScrap += carry;
  let emeraldCarry = state.emerald;
  state.totalEmerald += emeraldCarry;
  state.emerald = 0;
  let newBest = state.floor > state.bestFloor;
  if(newBest) state.bestFloor = state.floor;
  commitStats(false, carry);
  state.stats.emerald += emeraldCarry;
  if(carry > state.stats.maxScrapCarry) state.stats.maxScrapCarry = carry;
  if(emeraldCarry > state.stats.maxEmeraldCarry) state.stats.maxEmeraldCarry = emeraldCarry;
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: true, floor: state.floor, carry, emeraldCarry, goddess: true, newBest, unlocks };
  state.mode = "result";
  render();
}

function continueRun(){
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// --- ショップ購入 ---
function buyPotion(){
  const cost = 1;
  if(state.totalScrap < cost){ showAlert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ showAlert("持ち物がいっぱい"); return; }
  state.totalScrap -= cost;
  state.items.push({ name: "ポーション", effect: "hp3" });
  playSE("coin");
  saveAll();
  render();
}

function buyAntidote(){
  const cost = 10;
  if(state.totalScrap < cost){ showAlert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ showAlert("持ち物がいっぱい"); return; }
  state.totalScrap -= cost;
  state.items.push({ name: "毒消し草", effect: "antidote" });
  playSE("coin");
  saveAll();
  render();
}

function buyPotionHeal(){
  if(state.upgrades.potionHeal >= 7){ showAlert("これ以上強化できない"); return; }
  let cost = getPotionHealCost();
  if(state.totalScrap < cost){ showAlert("スクラップが足りない"); return; }
  let curVal = getPotionHealValue();
  showConfirm(`スクラップ ${cost.toLocaleString()} でポーション回復量を +1 強化しますか？<br>（${curVal} → ${curVal+1}）`, () => {
    state.totalScrap -= cost;
    state.upgrades.potionHeal++;
    playSE("coin");
    saveAll();
    render();
  });
}

function buyHp(){
  let cost = getHpCost();
  if(state.totalScrap < cost){ showAlert("スクラップが足りない"); return; }
  showConfirm(`スクラップ ${cost.toLocaleString()} で最大HP +1 を購入しますか？`, () => {
    state.totalScrap -= cost;
    state.maxHp++;
    state.hp++;
    state.upgrades.hp++;
    playSE("coin");
    saveAll();
    render();
  });
}

function buyPower(){
  let cost = getPowerCost();
  if(state.totalScrap < cost){ showAlert("スクラップが足りない"); return; }
  showConfirm(`スクラップ ${cost.toLocaleString()} で採掘力 +1 を購入しますか？`, () => {
    state.totalScrap -= cost;
    state.power++;
    state.upgrades.power++;
    playSE("coin");
    saveAll();
    render();
  });
}

render();
</script>

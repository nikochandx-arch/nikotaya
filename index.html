<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 32px;
}

h2 { font-size: 40px; }
#status { margin-bottom: 12px; font-size: 34px; }
#log { margin-bottom: 16px; font-size: 28px; }

#top {
  height: 700px;
  overflow-y: auto;
  padding: 16px;
}

/* ★ボタンエリアを中央固定 */
#actions {
  border-top: 2px solid #0f0;
  border-bottom: 2px solid #0f0;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  background: #111;
}

/* ★下は純粋な情報エリア */
#bottom {
  flex: 1;
  display: flex;
  gap: 20px;
  padding: 16px;
}

#leftPanel { flex: 1; }

#rightPanel {
  width: 40%;
  border-left: 2px solid #0f0;
  padding-left: 16px;
}

#storage {
  margin-top: 16px;
  padding-top: 10px;
  border-top: 2px solid #0f0;
  color: #ffcc66;
}

#playerStatus {
  margin-top: 16px;
  padding-top: 10px;
  border-top: 2px solid #0f0;
  color: #0ff;
}

#shop {
  color: #fff;
}

button {
  min-width: 180px;
  max-width: 260px;
  flex: 1;
  margin: 8px;
  padding: 20px 0;
  background: #222;
  color: #0f0;
  border: 2px solid #0f0;
  font-size: 28px;
}

#log div { margin-bottom: 6px; color: #fff; }
.log-new { font-weight: bold; }
.log-damage { color: #f55; }
.log-scrap { color: #ffcc66; }
.log-divider { color: #888; text-align: center; }
</style>
</head>

<body>

<div id="top">
  <h2>Nikotaya Mining Roguelike</h2>
  <div id="status"></div>
  <div id="log"></div>
</div>

<!-- ★ここに戻した -->
<div id="actions"></div>

<div id="bottom">
  <div id="leftPanel">
    <div id="storage"></div>
    <div id="playerStatus"></div>
  </div>

  <div id="rightPanel">
    <div id="shop"></div>
  </div>
</div>

<script>
let state = {
  name: "プレイヤー",
  hp: 10,
  maxHp: 10,
  mp: 0,
  maxMp: 0,
  power: 1,
  skills: [],
  scrap: 0,
  totalScrap: 0,
  floor: 1,
  log: [],
  mode: "home"
};

// --- 永続 ---
let savedScrap = localStorage.getItem("totalScrap");
if (savedScrap) state.totalScrap = parseInt(savedScrap) || 0;

let savedName = localStorage.getItem("playerName");
if (savedName) state.name = savedName;

let savedMaxHp = localStorage.getItem("maxHp");
if (savedMaxHp) state.maxHp = parseInt(savedMaxHp);

let savedPower = localStorage.getItem("power");
if (savedPower) state.power = parseInt(savedPower);

// --- HP ---
function damage(dmg) {
  state.hp = Math.max(0, state.hp - dmg);
}
function heal(val) {
  state.hp = Math.min(state.hp + val, state.maxHp);
}

// --- 採掘 ---
function calcScrapGain() {
  let tier = Math.floor((state.floor - 1) / 10) + 1;
  let base = state.power * tier;
  let variance = Math.floor(base * (Math.random() - 0.5));
  return Math.max(1, base + variance);
}

// --- ログ ---
function addLog(text, type="normal") {
  let prefix = (type === "divider") ? "" : `【${state.floor}階】`;
  state.log.unshift({text: prefix + text, type});
  state.log = state.log.slice(0, 12);
}

// --- 描画 ---
function render() {
  document.getElementById("status").innerText =
    `HP:${state.hp}/${state.maxHp} | スクラップ:${state.scrap} | 現在地:${state.floor}階`;

  document.getElementById("storage").innerText =
    `倉庫：スクラップ ${state.totalScrap}`;

  document.getElementById("playerStatus").innerText =
`名前：${state.name}
最大HP：${state.maxHp}
最大MP：${state.maxMp}
採掘力：${state.power}
スキル：${state.skills.length ? state.skills.join(", ") : "なし"}`;

  let logHTML = "";
  state.log.forEach((e,i)=>{
    let cls="";
    if(i===0) cls+="log-new ";
    if(e.type==="damage") cls+="log-damage ";
    if(e.type==="scrap") cls+="log-scrap ";
    if(e.type==="divider") cls+="log-divider ";
    logHTML += `<div class="${cls}">${e.text}</div>`;
  });
  document.getElementById("log").innerHTML = logHTML;

  let act = document.getElementById("actions");
  act.innerHTML = "";

  switch(state.mode){
    case "home":
      createButton("採掘開始", startRun);
      createButton("名前変更", changeName);
      break;
    case "explore":
      createButton("採掘する", next);
      break;
    case "event":
      createButton("開ける", openChest);
      createButton("無視する", ignoreChest);
      break;
    case "return":
      createButton("帰還する", doReturn);
      createButton("続行する", continueRun);
      break;
    case "dead":
      createButton("帰還する", forceReturn);
      break;
  }

  renderShop();
}

function createButton(t,fn){
  let b=document.createElement("button");
  b.innerText=t;
  b.onclick=fn;
  document.getElementById("actions").appendChild(b);
}

// --- ショップ ---
function renderShop(){
  let shop=document.getElementById("shop");

  if(state.mode!=="home"){
    shop.innerHTML="";
    return;
  }

  let hpCost = 30 + (state.maxHp - 10) * 10;
  let powerCost = 100 + (state.power - 1) * 50;

  shop.innerHTML = `
  <div>【ショップ】</div>
  <button onclick="buyHp()">最大HP +1（スクラップ ${hpCost}）</button>
  <button onclick="buyPower()">採掘力 +1（スクラップ ${powerCost}）</button>
  `;
}

function buyHp(){
  let cost = 30 + (state.maxHp - 10) * 10;

  if(state.totalScrap < cost){
    alert("スクラップ不足");
    return;
  }

  if(!confirm(\`スクラップ ${cost} で購入しますか？\`)) return;

  state.totalScrap -= cost;
  state.maxHp += 1;

  localStorage.setItem("totalScrap", state.totalScrap);
  localStorage.setItem("maxHp", state.maxHp);

  addLog("最大HPが増加した！");
  render();
}

function buyPower(){
  let cost = 100 + (state.power - 1) * 50;

  if(state.totalScrap < cost){
    alert("スクラップ不足");
    return;
  }

  if(!confirm(\`スクラップ ${cost} で購入しますか？\`)) return;

  state.totalScrap -= cost;
  state.power += 1;

  localStorage.setItem("totalScrap", state.totalScrap);
  localStorage.setItem("power", state.power);

  addLog("採掘力が増加した！");
  render();
}

// --- 名前 ---
function changeName(){
  let n = prompt("名前入力");
  if(n){
    state.name=n;
    localStorage.setItem("playerName", n);
  }
  render();
}

// --- ゲーム ---
function startRun(){
  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];
  state.mode = "explore";

  addLog("採掘開始！");
  render();
}

function next(){
  state.floor++;

  if(state.floor % 10 === 0){
    addLog(`－－－ ${state.floor}階層（帰還可能）－－－`, "divider");
    state.mode="return";
    render();
    return;
  }

  let r=Math.random();

  if(r<0.5){
    let gain = calcScrapGain();
    state.scrap += gain;
    addLog(`採掘した スクラップ +${gain}`, "scrap");

  }else if(r<0.75){
    let dmg = Math.floor(Math.random()*3)+1;
    damage(dmg);
    addLog(`落石！ ${dmg} ダメージ`, "damage");

  }else{
    state.mode="event";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  checkDeath();
  render();
}

function openChest(){
  let r=Math.random();

  if(r<0.6){
    let gain=Math.floor(Math.random()*5)+2;
    state.scrap+=gain;
    addLog(`資源を発見！ スクラップ +${gain}`, "scrap");
  }else{
    let dmg=Math.floor(Math.random()*5)+2;
    damage(dmg);
    addLog(`トラップ作動！ ${dmg} ダメージ`, "damage");
  }

  checkDeath();
  state.mode="explore";
  render();
}

function ignoreChest(){
  addLog("コンテナを無視した");
  state.mode="explore";
  render();
}

function checkDeath(){
  if(state.hp<=0){
    addLog("HPが0になった…");
    state.mode="dead";
  }
}

function doReturn(){
  let carry = Math.floor(state.scrap/2);

  state.totalScrap += carry;
  localStorage.setItem("totalScrap", state.totalScrap);

  addLog(`帰還した。スクラップ${carry}を持ち帰った`, "scrap");

  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode="home";
  render();
}

function forceReturn(){
  addLog("撤退した…");

  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode="home";
  render();
}

function continueRun(){
  addLog("さらに深く潜る…");
  state.mode="explore";
  render();
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  padding: 16px;
  font-size: 18px;
}
h2 { font-size: 24px; }
#status { margin-bottom: 8px; font-size: 20px; }
#log { margin-bottom: 16px; font-size: 16px; }
button {
display: block;
margin: 12px auto;
padding: 16px 0;
width: 160px;
background: #222;
color: #0f0;
border: 1px solid #0f0;
font-size: 18px;
}

#log div { margin-bottom: 4px; color: #fff; }
.log-new { font-weight: bold; font-size: 18px; }
.log-damage { color: #f55; }
.log-heal { color: #5f5; }
.log-scrap { color: #ffcc66; } /* スクラップ色 */
</style>
</head>
<body>
<h2>Nikotaya Mining Roguelike</h2>
<div id="status"></div>
<div id="log"></div>
<div id="actions"></div>
<script>
let state = {
  hp: 10,
  scrap: 0,
  floor: 1,
  log: [],
  mode: "explore",
  event: null
};

function addLog(text, type = "normal") {
  state.log.unshift({ text, type });
  state.log = state.log.slice(0, 8);
}

function render() {
  document.getElementById("status").innerText =
    `HP: ${state.hp} | Scrap: ${state.scrap} | Floor: ${state.floor}`;

  let logHTML = "";
  state.log.forEach((entry, index) => {
    let cls = "";
    if (index === 0) cls += "log-new ";
    if (entry.type === "damage") cls += "log-damage ";
    if (entry.type === "heal") cls += "log-heal ";
    if (entry.type === "scrap") cls += "log-scrap ";
    logHTML += `<div class="${cls}">${entry.text}</div>`;
  });
  document.getElementById("log").innerHTML = logHTML;

  let actions = document.getElementById("actions");
  actions.innerHTML = "";

  if (state.mode === "explore") {
    createButton("採掘する", next);
  } else if (state.mode === "event") {
    createButton("開ける", openChest);
    createButton("無視する", ignoreChest);
  }
}

function createButton(text, onClick) {
  let btn = document.createElement("button");
  btn.innerText = text;
  btn.onclick = onClick;
  document.getElementById("actions").appendChild(btn);
}

function next() {
  state.floor++;

  let r = Math.random();

  if (r < 0.5) {
    // 採掘成功
    let gain = Math.floor(Math.random() * 3) + 1;
    state.scrap += gain;
    addLog(`採掘した スクラップ+${gain}`, "scrap");

  } else if (r < 0.75) {
    // 事故ダメージ
    let dmg = Math.floor(Math.random() * 3) + 1;
    state.hp -= dmg;
    addLog(`落石！ ${dmg} ダメージ`, "damage");

  } else {
    // 宝箱イベント
    state.mode = "event";
    state.event = "chest";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  if (state.hp <= 0) {
    addLog("力尽きた…");
    gameOver();
    return;
  }

  render();
}

function openChest() {
  let r = Math.random();

  if (r < 0.6) {
    let gain = Math.floor(Math.random() * 5) + 2;
    state.scrap += gain;
    addLog(`資源を発見！ スクラップ+${gain}`, "scrap");

  } else {
    let dmg = Math.floor(Math.random() * 5) + 2;
    state.hp -= dmg;
    addLog(`トラップ作動！ ${dmg} ダメージ`, "damage");
  }

  if (state.hp <= 0) {
    addLog("力尽きた…");
    gameOver();
    return;
  }

  state.mode = "explore";
  state.event = null;
  render();
}

function ignoreChest() {
  addLog("コンテナを無視した");
  state.mode = "explore";
  state.event = null;
  render();
}

function gameOver() {
  let actions = document.getElementById("actions");
  actions.innerHTML = "";
  createButton("リスタート", restart);
}

function restart() {
  state = {
    hp: 10,
    scrap: 0,
    floor: 1,
    log: [],
    mode: "explore",
    event: null
  };
  addLog("採掘開始！");
  render();
}

// 初期化
addLog("採掘開始！");
render();
</script>
</body>
</html>

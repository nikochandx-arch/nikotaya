// --- バフ管理 ---
function applyBuff(buff){
  // 同じidがあれば上書き、なければ追加
  let idx = state.buffs.findIndex(b => b.id === buff.id);
  if(idx >= 0) state.buffs[idx] = buff;
  else state.buffs.push(buff);
}

function tickBuffs(){
  // 階層が上がった瞬間に発動・ターン消費
  state.buffs.forEach(b => {
    if(b.onTurn) b.onTurn();
    b.turns--;
  });
  // 0以下になったバフを削除
  state.buffs = state.buffs.filter(b => b.turns > 0);
}

function clearBuffs(){
  state.buffs = [];
  state.moleBlock = -1;
}

// --- 採掘力UPバフを付与する関数 ---
function applyMiningUp(turns){
  applyBuff({
    id: "miningUp",
    name: "⛏️ 採掘力UP",
    turns: turns,
    isBad: false,
    miningBonus: 1,  // +1倍（採掘量2倍）
    onTurn: null
  });
}

// --- 採掘量低下デバフを付与する関数 ---
function applyMiningDown(turns){
  applyBuff({
    id: "miningDown",
    name: "🤕 採掘量低下",
    turns: turns,
    isBad: true,
    miningPenalty: 0.5,  // ×0.5（半減）
    onTurn: null
  });
}

// --- 毒を付与する関数 ---
function applyPoison(turns){
  applyBuff({
    id: "poison",
    name: "🩸 毒",
    turns: turns,
    isBad: true,
    onTurn: () => {
      let d = Math.max(1, Math.floor(state.maxHp * 0.1));
      // 毒で死なない：HP1を必ず残す
      d = Math.min(d, state.hp - 1);
      if(d > 0){
        damage(d, true); // 毒は鋼皮の紋の軽減対象外
        addLog(`🩸 毒ダメージ ${d}`, "damage");
      }
    }
  });
}

// --- SE（Web Audio API） ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

async function initAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
  if(audioCtx.state === "suspended") await audioCtx.resume();
}

// 採掘音：ザクッ（こもった土の音）
async function playDigSound(){
  await initAudio();
  const duration = 0.08;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const src    = audioCtx.createBufferSource();
  src.buffer   = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type  = "lowpass";
  filter.frequency.value = 800;
  const gain   = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// 回復音：ポチョン（清涼感・神秘感）
async function playHealSound(){
  await initAudio();
  const duration = 0.2;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

// フォアグラウンド復帰時にAudioContextを自動resume
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && audioCtx) {
    audioCtx.resume();
  }
});

// SE管理マスタ（将来ここに追加していく）
const SE = {
  dig:  playDigSound,
  heal: playHealSound,
};

async function playSE(name){
  if(!state.seOn) return;
  try {
    if(SE[name]) await SE[name]();
  } catch(e) {
    console.warn("SE error:", e);
  }
}

// --- SEトグル ---
function toggleSE(){
  state.seOn = !state.seOn;
  localStorage.setItem("seOn", state.seOn);
  if(state.seOn) playSE("dig"); // ONに戻した時にプレビュー音
  render();
}

const UNLOCKED_CRESTS = new Set(JSON.parse(localStorage.getItem("unlockedCrests") || "[]"));

// 解放条件判定（必要に応じて条件を追加）
const UNLOCK_CHECKS = {
  mining: () => state.bestFloor >= 50,
  steel:  () => state.bestFloor >= 50,
  detect: () => state.bestFloor >= 50,
  // 他の紋は今後追加
};

// 解放チェック：新規解放されたIDの配列を返す
function checkUnlocks(){
  let newlyUnlocked = [];
  for(let id in UNLOCK_CHECKS){
    if(!UNLOCKED_CRESTS.has(id) && UNLOCK_CHECKS[id]()){
      UNLOCKED_CRESTS.add(id);
      newlyUnlocked.push(id);
    }
  }
  if(newlyUnlocked.length > 0){
    localStorage.setItem("unlockedCrests", JSON.stringify([...UNLOCKED_CRESTS]));
  }
  return newlyUnlocked;
}

// ランの統計を永続に加算してリセット
function commitStats(died, carry=0){
  state.stats.runs++;
  if(died) state.stats.deaths++;
  state.stats.floors     += state.runStats.floors;
  state.stats.scrap      += carry;  // 実際に持ち帰った分のみ
  state.stats.damage     += state.runStats.damage;
  state.stats.potions    += state.runStats.potions;
  state.stats.goddess    += state.runStats.goddess;
  state.stats.goldenMole += state.runStats.goldenMole;
  state.stats.thiefMole  += state.runStats.thiefMole;
  state.stats.daigo      += state.runStats.daigo;
  resetRunStats();
}

// --- コスト ---
function getHpCost()      { return 30  + state.upgrades.hp    * 20; }
function getPowerCost()   { return 100 + state.upgrades.power * 50; }
function getPotionHealCost() { return Math.floor(2000 * Math.pow(4, state.upgrades.potionHeal)); }
function getPotionHealValue(){ return 3 + state.upgrades.potionHeal; }

// --- HP処理 ---
function damage(d, ignoreArmor=false){
  // 鋼皮の紋：毒以外のダメージを2軽減（最低1）
  if(!ignoreArmor && state.relics.some(r => r.id === "steel")){
    d = Math.max(1, d - 2);
  }
  let actual = Math.min(d, state.hp);
  state.hp = Math.max(0, state.hp - d);
  state.runStats.damage += actual;
}
function heal(v)  { state.hp = Math.min(state.maxHp, state.hp + v); }

// --- ログテキスト色付け ---
function colorizeLog(text, type){
  // アイテム名を黄緑に
  Object.values(ITEM_DEF).forEach(def => {
    text = text.split(def.name).join(
      `<span style="color:#aaffaa;font-weight:bold;">${def.name}</span>`);
  });
  // ダメージ数値を赤に（「X ダメージ」）
  text = text.replace(/(\d+)( ダメージ)/g,
    '<span style="color:#f55;font-weight:bold;">$1</span>$2');
  // スクラップ数値をオレンジに（「+X」）
  text = text.replace(/(\+\d+)/g,
    '<span style="color:#ffcc66;font-weight:bold;">$1</span>');
  // HP回復を黄緑に（全タイプ共通）
  text = text.replace(/(HP\+\d+|HP \+\d+)/g,
    '<span style="color:#aaff66;font-weight:bold;">$1</span>');
  // subのダメージ・回復も色付け
  if(type === "sub"){
    text = text.replace(/(\d+)( ダメージ)/g,
      '<span style="color:#f55;font-weight:bold;">$1</span>$2');
    text = text.replace(/(HP \+\d+)/g,
      '<span style="color:#aaff66;font-weight:bold;">$1</span>');
    // スクラップ捨てはオレンジ
    text = text.replace(/スクラップ (\d+)/g,
      'スクラップ <span style="color:#ffcc66;font-weight:bold;">$1</span>');
  }
  return text;
}

// --- 絵文字取得 ---
function getEmoji(text, type){
  if(type==="divider")     return "🚪";
  if(type==="damage")      return text.includes("毒") ? "🩸" : "💥";
  if(type==="scrap")       return "⛏️";
  if(type==="heal")        return "💤";
  if(type==="loss")        return "🕳️";
  if(type==="sub")         return "";
  if(text.includes("採掘開始"))     return "⛏️";
  if(text.includes("コンテナ"))     return "📦";
  if(text.includes("鉱脈"))         return "💎";
  if(text.includes("キノコ"))       return "🍄";
  if(text.includes("帰還"))         return "🏠";
  if(text.includes("HPが0"))        return "💀";
  if(text.includes("一休み"))       return "💤";
  if(text.includes("亀裂"))         return "🕳️";
  if(text.includes("有毒ガス"))      return "🌫️";
  if(text.includes("暗闇で岩"))      return "🪨";
  if(text.includes("足を滑らせ"))    return "🧊";
  if(text.includes("手首を痛め"))    return "🤕";
  if(text.includes("コウモリ"))     return "🦇";
  if(text.includes("女神"))         return "🗿";
  if(text.includes("加護"))          return "🗿";
  if(text.includes("DAIGO"))         return "👤";
  return "📋";
}

// --- ログ ---
// state.log = [ { floor, lines: [{text, type, emoji}] }, ... ]
// subはその階の最新エントリのlinesに追加、それ以外は新エントリ

function addLog(text, type="normal"){
  let emoji = getEmoji(text, type);

  if(type === "sub"){
    // 最新エントリのlinesに追加
    if(state.log.length > 0){
      state.log[0].lines.push({text, type, emoji});
    }
    return;
  }

  // 新しい階層エントリを先頭に追加
  let entry = {
    floor: state.floor,
    type,           // エントリ全体の代表タイプ（アイコン・色に使う）
    lines: [{text, type, emoji}]
  };
  state.log.unshift(entry);
  state.log = state.log.slice(0, 10); // 10階層分保持
}

function useItem(index){
  let item = state.items[index];
  let def  = ITEM_DEF[item.effect];
  if(!def){ return; }

  // 効果発動
  if(item.effect === "hp3"){
    let v = getPotionHealValue();
    heal(v);
    playSE("heal");
    state.runStats.potions++;
    addLog(`ポーションを使った！ HP +${v}`, "scrap");
  } else if(item.effect === "antidote"){
    let idx = state.buffs.findIndex(b => b.id === "poison");
    if(idx >= 0){
      state.buffs.splice(idx, 1);
      playSE("heal");
      addLog("毒消し草を使った！ 毒が治った", "heal");
    } else {
      addLog("毒消し草を使った（毒状態ではなかった）", "normal");
    }
  }

  // 消費して上詰め
  state.items.splice(index, 1);
  saveAll();
  state.mode = prevMode;
  render();
}

function discardItem(index){
  let item = state.items[index];
  if(confirm(`「${item.name}」を本当に捨てますか？`)){
    state.items.splice(index, 1);
    saveAll();
    render();
  }
}

// --- 採掘開始 ---
function startRun(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  clearBuffs();
  resetRunStats();
  state.daigoLastFloor = -999;
  state.relics = [];
  state.relicEventFloors = new Set();
  state.activeCrestId = null;
  state.mode  = "explore";
  addLog("採掘開始！");
  render();
}

// --- 採掘量計算 ---
function calcScrap(){
  let bonus    = Math.floor((state.floor-1)/10) + 1;
  let base     = state.power * bonus;
  let variance = Math.floor(base * (Math.random() - 0.5));
  return Math.max(1, base + variance);
}

// --- 採掘倍率計算 ---
function getMiningMultiplier(){
  // バフ：(1 + miningBonus合計)
  let bonus = state.buffs
    .filter(b => b.miningBonus)
    .reduce((sum, b) => sum + b.miningBonus, 0);
  // デバフ：miningPenalty の積算（0.5なら半減）
  let penalty = state.buffs
    .filter(b => b.miningPenalty)
    .reduce((prod, b) => prod * b.miningPenalty, 1);
  return (1 + bonus) * penalty;
}

// --- 階層補正ヘルパー ---
function floorDmgBonus()  { return Math.floor(state.floor / 10); }
function floorHealBonus() { return Math.floor(state.floor / 20); }

// --- 探索 ---
function next(){
  playSE("dig");
  state.floor++;
  state.runStats.floors++;

  // バフ・デバフのターン処理（階層上昇時）
  tickBuffs();
  if(state.hp <= 0){ checkDeath(); render(); return; }

  // 紋獲得イベント：51階,101階,151階...
  if(state.floor > 1 && (state.floor - 1) % 50 === 0 && !state.relicEventFloors.has(state.floor)){
    state.relicEventFloors.add(state.floor);
    let pool = CREST_MASTER.filter(c =>
      UNLOCKED_CRESTS.has(c.id) &&
      !state.relics.some(r => r.id === c.id)
    );
    if(pool.length > 0){
      // ランダムに最大3つ選ぶ
      let shuffled = [...pool].sort(() => Math.random() - 0.5);
      state.relicChoices = shuffled.slice(0, 3);
      state.mode = "event_relic_pick";
      addLog("紋を発見した！");
      render();
      return;
    }
    // 候補が1つもない場合はスキップして通常進行
  }

  if(state.floor % 30 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\n女神像がある…`, "divider");
    state.mode = "event_goddess";
    render();
    return;
  }

  if(state.floor % 10 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\nスクラップを半分支払えば帰還できそうだ`, "divider");
    state.mode = "return";
    render();
    return;
  }

  // --- 軽(70%) / 重(30%) の2段階抽選 ---
  const LIGHT_EVENTS = [
    // 採掘 60%
    { w: 60, fn: () => {
      let g = Math.floor(calcScrap() * getMiningMultiplier());
      // 採掘の紋：floor(採掘力/2) + floor(階数/20) を加算
      if(state.relics.some(r => r.id === "mining")){
        g += Math.floor(state.power / 2) + Math.floor(state.floor / 20);
      }
      state.scrap += g;
      addLog(`採掘した スクラップ +${g.toLocaleString()}`, "scrap");
    }},
    // 落石 20%
    { w: 20, fn: () => {
      let d = Math.floor(Math.random()*3) + 1 + floorDmgBonus();
      damage(d);
      addLog(`落石！ ${d} ダメージ`, "damage");
    }},
    // 一休み 10%
    { w: 10, fn: () => {
      let h = Math.floor(Math.random()*2) + 1 + floorHealBonus();
      heal(h);
      playSE("heal");
      addLog(`一休みした HP+${h}`, "heal");
    }},
    // 亀裂 10%
    { w: 10, fn: () => {
      let lost = Math.min(calcScrap(), state.scrap);
      state.scrap = Math.max(0, state.scrap - lost);
      addLog(`亀裂の隙間にスクラップを落としてしまった スクラップ -${lost.toLocaleString()}`, "loss");
    }},
    // 有毒ガス 8%
    { w: 8, fn: () => {
      applyPoison(2);
      addLog("有毒ガスが充満している！ 毒2ターン", "damage");
    }},
    // 暗闇で岩 7%
    { w: 7, fn: () => {
      let base = Math.floor(Math.random()*3) + 1 + floorDmgBonus();
      let d = Math.max(1, Math.floor(base / 2));
      damage(d);
      addLog(`暗闇で岩にぶつかった！ ${d} ダメージ`, "damage");
    }},
    // 足を滑らせた 7%
    { w: 7, fn: () => {
      let lost = Math.max(0, Math.floor(Math.floor(calcScrap() * 0.1) / 2));
      state.scrap = Math.max(0, state.scrap - lost);
      let d = Math.max(1, Math.ceil(state.maxHp * 0.05));
      damage(d);
      addLog(`足を滑らせた！`, "damage");
      addLog(`スクラップを ${lost.toLocaleString()} 落とした / ${d} ダメージを受けた`, "sub");
    }},
    // 手首を痛めた 5%（採掘量低下デバフ3T）
    { w: 5, fn: () => {
      applyMiningDown(3);
      addLog("採掘中に手首を痛めた… 採掘量低下（3ターン）", "damage");
    }},
    // DAIGO 3%（遭遇から+30階は再遭遇しない）
    { w: 3,
      condition: () => state.floor - state.daigoLastFloor >= 30,
      fn: () => {
        const DAIGO_TIPS = [
          "キノコは食べると毒になることがあるから気をつけて",
          "コンテナみつけるとつい開けちゃうよねぇ",
          "毒って苦しいけど毒ダメージで死ぬことはないらしいよ",
          "女神像に祈れば無事に帰れるみたいだよ",
          "階層が深くなるほど取れるスクラップも多くなるみたいだよ",
          "こないだコンテナからポーション拾っちゃった",
          "キノコ食べると稀にパワーアップするとか…ホントかな？",
        ];
        let tip = DAIGO_TIPS[Math.floor(Math.random() * DAIGO_TIPS.length)];
        state.daigoLastFloor = state.floor;
        state.runStats.daigo++;
        state.mode = "event_daigo";
        addLog(`採掘者DAIGOに出会った！`);
        state.log[0].tip = tip; // ログエントリにtipを付加
      }
    },
    // モグラ 1%（30階ブロック内で1回まで）
    { w: 1,
      condition: () => {
        let block = Math.floor((state.floor - 1) / 30);
        return state.moleBlock !== block;
      },
      fn: () => {
        let block = Math.floor((state.floor - 1) / 30);
        state.moleBlock = block;
        if(Math.random() < 0.5){
          // 金モグラ
          let gain = Math.floor(state.scrap / 2);
          state.scrap += gain;
          state.runStats.goldenMole++;
          addLog(`金モグラだ！ スクラップ +${gain.toLocaleString()}`, "scrap");
        } else {
          // 泥棒モグラ
          let lost = Math.floor(state.scrap / 2);
          state.scrap = Math.max(0, state.scrap - lost);
          state.runStats.thiefMole++;
          addLog(`泥棒モグラだ！ スクラップ -${lost.toLocaleString()}`, "loss");
        }
      }
    },
  ];

  const HEAVY_EVENTS = [
    { w: 20, fn: () => { state.mode = "event";          addLog("コンテナを発見した！"); }},
    { w: 40, fn: () => {
      state.veinDepth = 0;
      state.mode = "event_vein";
      addLog("鉱脈だ！だけど地盤が脆そうだ…");
    }},
    { w: 40, fn: () => { state.mode = "event_mushroom"; addLog("謎のキノコだ！"); }},
    { w: 30, fn: () => { state.mode = "event_bat";      addLog("コウモリの群れだ！"); }},
  ];

  // 探知の紋：重イベント率50%に
  let heavyThreshold = state.relics.some(r => r.id === "detect") ? 0.50 : 0.70;
  if(Math.random() < heavyThreshold){
    // 軽イベント：condition対応重み付き抽選
    let avail = LIGHT_EVENTS.filter(e => !e.condition || e.condition());
    if(avail.length === 0) avail = LIGHT_EVENTS.filter(e => !e.condition);
    let totalW = avail.reduce((s, e) => s + e.w, 0);
    let pick = Math.random() * totalW;
    let ev = avail[avail.length - 1];
    for(let e of avail){ pick -= e.w; if(pick <= 0){ ev = e; break; } }
    ev.fn();
    checkDeath();
    render();
  } else {
    // 重イベント：condition対応重み付き抽選（探知の紋で50%に上昇）
    let availH = HEAVY_EVENTS.filter(e => !e.condition || e.condition());
    if(availH.length === 0) availH = HEAVY_EVENTS.filter(e => !e.condition);
    let totalHW = availH.reduce((s, e) => s + e.w, 0);
    let pickH = Math.random() * totalHW;
    let ev = availH[availH.length - 1];
    for(let e of availH){ pickH -= e.w; if(pickH <= 0){ ev = e; break; } }
    ev.fn();
    if(state.mode !== "explore"){ render(); return; }
    checkDeath();
    render();
  }
}

// --- コンテナ ---
function openChest(){
  let r = Math.random();
  if(r < 0.60){
    // スクラップ 60%
    let g = calcScrap() * 3;
    state.scrap += g;
    addLog(`資源を発見！ スクラップ +${g.toLocaleString()}`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  } else if(r < 0.70){
    // ポーション 10%
    let newItem = { name: "ポーション", effect: "hp3" };
    if(state.items.length < 5){
      state.items.push(newItem);
      saveAll();
      addLog("ポーションを発見！", "sub");
      state.mode = "explore";
    } else {
      state.pendingItem = newItem;
      addLog("ポーションを発見！ でも手持ちがいっぱいだ…", "sub");
      state.mode = "event_item_full";
    }
  } else if(r < 0.85){
    // 空っぽ 15%
    addLog("空っぽだった…", "sub");
    state.mode = "explore";
  } else {
    // 罠 15%
    let d = Math.ceil(state.maxHp * 0.2);
    damage(d);
    addLog(`罠だった！ ${d} ダメージ`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  }
  render();
}

    a.appendChild(wrap);
  });
}

function dropAndKeep(dropIndex, allItems){
  // 捨てたアイテムを除いた5個を装備
  let kept = allItems.filter((_, i) => i !== dropIndex);
  state.items = kept;
  state.pendingItem = null;
  saveAll();
  let dropped = allItems[dropIndex];
  addLog(`${dropped.name} を捨てた`, "sub");
  state.mode = "explore";
  render();
}

// --- コウモリイベント ---
function calcBatLost(){
  return state.scrap > 0 ? Math.max(1, Math.floor(state.scrap * 0.1)) : 0;
}

function renderBatEvent(){
  let a = document.getElementById("actions");
  let lost = calcBatLost();

  // 「音を立てて気をそらす」ボタン
  let distractBtn = document.createElement("button");
  distractBtn.innerHTML = `音を立てて気をそらす<br><span style="font-size:22px;color:#ffcc66;">スクラップ -${lost}</span>`;
  let riskS = BTN_STYLES.risk;
  let skipS = BTN_STYLES.skip;
  if(state.scrap <= 0){
    distractBtn.style.borderColor = skipS.color;
    distractBtn.style.color       = skipS.color;
    distractBtn.style.background  = skipS.bg;
    distractBtn.disabled = true;
    distractBtn.style.opacity = "0.4";
  } else {
    distractBtn.style.borderColor = riskS.color;
    distractBtn.style.color       = riskS.color;
    distractBtn.style.background  = riskS.bg;
    distractBtn.style.boxShadow   = `0 0 10px ${riskS.color}66`;
    distractBtn.onclick = batDistract;
  }
  a.appendChild(distractBtn);

  // 「無理やり通る」ボタン（danger）
  let forceBtn = document.createElement("button");
  forceBtn.innerText = "無理やり通る";
  let dangerS = BTN_STYLES.danger;
  forceBtn.style.borderColor = dangerS.color;
  forceBtn.style.color       = dangerS.color;
  forceBtn.style.background  = dangerS.bg;
  forceBtn.style.boxShadow   = `0 0 10px ${dangerS.color}66`;
  forceBtn.onclick = batForce;
  a.appendChild(forceBtn);
}

function batDistract(){
  let lost = calcBatLost();
  state.scrap = Math.max(0, state.scrap - lost);
  addLog(`スクラップ ${lost.toLocaleString()} を投げて気をそらした`, "sub");
  state.mode = "explore";
  render();
}

function batForce(){
  if(Math.random() < 0.40){
    addLog("うまく切り抜けられた！", "sub");
  } else {
    let d = Math.ceil(state.maxHp * 0.1);
    damage(d);
    applyPoison(3);
    addLog(`コウモリに襲われた！ ${d} ダメージ＋毒3ターン`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 紋フキダシトグル ---
function toggleCrestTooltip(id){
  state.activeCrestId = state.activeCrestId === id ? null : id;
  let tooltipEl = document.getElementById("crest-tooltip");
  if(state.activeCrestId){
    let c = CREST_MASTER.find(m => m.id === state.activeCrestId);
    if(c && tooltipEl){
      tooltipEl.style.display = "block";
      tooltipEl.innerHTML = `<div style="background:#2d2d2d;border:2px solid ${c.color};border-radius:10px;
        padding:14px 20px;font-size:24px;color:${c.color};text-align:center;
        box-shadow:0 0 16px rgba(${c.rgb},0.5);">${c.desc}</div>`;
    }
  } else {
    if(tooltipEl) tooltipEl.style.display = "none";
  }
  render();
}

// --- 紋獲得イベント ---
function renderRelicPickEvent(){
  let a = document.getElementById("actions");
  state.relicChoices.forEach(c => {
    let b = document.createElement("button");
    b.innerText = c.name;
    b.style.borderColor = c.color;
    b.style.color       = c.color;
    b.style.background  = `rgba(${c.rgb},0.1)`;
    b.style.boxShadow   = `0 0 10px ${c.color}66`;
    b.onclick = () => pickRelic(c);
    a.appendChild(b);
  });
  btn("どれも選ばない", skipRelic, "skip");
}

function pickRelic(crest){
  if(state.relics.length < 5){
    state.relics.push(crest);
    addLog(`『${crest.name}』を装備した`, "sub");
    state.relicChoices = [];
    state.mode = "explore";
    render();
  } else {
    // スロット満タン → 入れ替え選択モードへ
    state.pendingRelic = crest;
    state.relicChoices = [];
    state.mode = "event_relic_swap";
    render();
  }
}

function skipRelic(){
  addLog("紋を見送った", "sub");
  state.relicChoices = [];
  state.mode = "explore";
  render();
}

function renderRelicSwapEvent(){
  let a = document.getElementById("actions");
  state.relics.forEach((r, i) => {
    let b = document.createElement("button");
    b.innerText = r.name;
    b.style.borderColor = r.color;
    b.style.color       = r.color;
    b.style.background  = `rgba(${r.rgb},0.1)`;
    b.style.boxShadow   = `0 0 10px ${r.color}66`;
    b.onclick = () => swapRelic(i);
    a.appendChild(b);
  });
  btn("やめる", cancelSwap, "skip");
}

function swapRelic(index){
  let old = state.relics[index];
  state.relics[index] = state.pendingRelic;
  addLog(`『${old.name}』を外し、『${state.pendingRelic.name}』を装備した`, "sub");
  state.pendingRelic = null;
  state.mode = "explore";
  render();
}

function cancelSwap(){
  addLog(`『${state.pendingRelic.name}』を見送った`, "sub");
  state.pendingRelic = null;
  state.mode = "explore";
  render();
}

// --- DAIGOイベント ---
function renderDaigoEvent(){
  btn("了解！", ignoreDaigo, "main");
}

function ignoreDaigo(){
  addLog("DAIGOと別れた", "sub");
  state.mode = "explore";
  render();
}

// --- 共通：無視して進む ---
function ignoreEvent(){
  addLog("無視した", "sub");
  state.mode = "explore";
  render();
}

// --- 鉱脈イベント ---
const VEIN_PARAMS = [
  { collapse:0.20, mult:1.0, dmgRate:0.15 },
  { collapse:0.40, mult:1.5, dmgRate:0.25 },
  { collapse:0.60, mult:2.5, dmgRate:0.40 },
  { collapse:0.80, mult:4.0, dmgRate:0.60 },
];

function renderVeinEvent(){
  let depth = state.veinDepth;
  if(depth === 0){
    btn("掘る", digVein, "risk");
  } else {
    let label = depth < 4 ? "もう1回掘る" : null;
    if(label) btn(label, digVein, "risk");
    btn("やめる", leaveVein, "skip");
  }
}

function digVein(){
  let depth = state.veinDepth;
  let p = VEIN_PARAMS[Math.min(depth, 3)];

  if(Math.random() < p.collapse){
    // 崩落
    let d = Math.ceil(state.maxHp * p.dmgRate) + floorDmgBonus();
    damage(d);
    addLog(`地盤が崩れた！ ${d} ダメージ`, "sub");
    checkDeath();
    if(state.mode !== "dead") state.mode = "explore";
  } else {
    // 成功
    let g = Math.floor(calcScrap() * p.mult);
    state.scrap += g;
    addLog(`鉱脈を掘り当てた！ スクラップ +${g.toLocaleString()}`, "sub");
    state.veinDepth++;
    // 4回目終了 or 続行
    if(state.veinDepth >= 4){
      addLog("これ以上は無理だ…", "sub");
      state.mode = "explore";
    }
    // 4回未満なら event_vein のまま→renderVeinEventがボタンを描画
  }
  render();
}

function leaveVein(){
  addLog("鉱脈から引き上げた", "sub");
  state.mode = "explore";
  render();
}

// --- キノコイベント ---
function eatMushroom(){
  let r = Math.random();
  if(r < 0.40){
    applyPoison(2);
    addLog("苦い！ 毒を受けた（2ターン）", "sub");
  } else if(r < 0.80){
    let h = 3 + floorHealBonus();
    heal(h);
    playSE("heal");
    addLog(`甘い香り… HP +${h} 回復した`, "sub");
  } else if(r < 0.88){
    let back = Math.min(2, state.floor - 1);
    state.floor -= back;
    addLog(`錯乱した！ ${back}階層戻された`, "sub");
  } else if(r < 0.96){
    let lost = Math.floor(state.scrap * 0.1);
    state.scrap = Math.max(0, state.scrap - lost);
    addLog(`錯乱した！ スクラップ ${lost.toLocaleString()} をばらまいた`, "sub");
  } else {
    applyMiningUp(5);
    addLog("不思議な胞子を吸い込んだ… 採掘力UP！（5ターン）", "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 死亡 ---
function checkDeath(){
  if(state.hp <= 0){
    addLog("HPが0になった…", "sub");
    state.mode = "dead";
  }
}

// --- 帰還 ---
function confirmReturn(){
  if(confirm("本当に帰還しますか？（スクラップの半分を持ち帰ります）")){
    state.mode = "result";  // returnモードを先に抜ける
    doReturn();
  }
}

function doReturn(){
  let carry = Math.floor(state.scrap / 2);
  state.totalScrap += carry;
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(false, carry);
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: true, floor: state.floor, carry, unlocks };
  state.mode = "result";
  render();
}

function forceReturn(){
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(true);
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: false, floor: state.floor, carry: 0, unlocks };
  state.mode = "result";
  render();
}

function goHome(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  state.lastResult = null;
  state.activeCrestId = null;
  let tooltipEl = document.getElementById("crest-tooltip");
  if(tooltipEl) tooltipEl.style.display = "none";
  clearBuffs();
  state.mode  = "home";
  render();
}

// --- 女神像イベント ---
function goddessHeal(){
  state.runStats.goddess++;
  let h = Math.max(5, Math.ceil(state.maxHp * 0.4));
  heal(h);
  playSE("heal");
  addLog(`女神の加護！ HP +${h} 回復した`, "heal");
  state.mode = "explore";
  render();
}

function goddessReturn(){
  state.runStats.goddess++;
  let carry = state.scrap;
  state.totalScrap += carry;
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(false, carry);
  saveAll();
  let unlocks = checkUnlocks();
  state.lastResult = { survived: true, floor: state.floor, carry, goddess: true, unlocks };
  state.mode = "result";
  render();
}

function continueRun(){
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// --- ショップ購入 ---
function buyPotion(){
  const cost = 10;
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ alert("持ち物がいっぱい"); return; }
  if(confirm(`スクラップ ${cost} でポーションを購入しますか？`)){
    state.totalScrap -= cost;
    state.items.push({ name: "ポーション", effect: "hp3" });
    saveAll();
    render();
  }
}

function buyAntidote(){
  const cost = 10;
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ alert("持ち物がいっぱい"); return; }
  if(confirm(`スクラップ ${cost} で毒消し草を購入しますか？`)){
    state.totalScrap -= cost;
    state.items.push({ name: "毒消し草", effect: "antidote" });
    saveAll();
    render();
  }
}

function buyPotionHeal(){
  if(state.upgrades.potionHeal >= 7){ alert("これ以上強化できない"); return; }
  let cost = getPotionHealCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost.toLocaleString()} でポーション回復量を +1 強化しますか？（${getPotionHealValue()} → ${getPotionHealValue()+1}）`)){
    state.totalScrap -= cost;
    state.upgrades.potionHeal++;
    saveAll();
    render();
  }
}

function buyHp(){
  let cost = getHpCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap  -= cost;
    state.maxHp++;
    state.hp++;          // 現在HPも+1（即時反映）
    state.upgrades.hp++;
    saveAll();
    render();
  }
}

function buyPower(){
  let cost = getPowerCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap   -= cost;
    state.power++;
    state.upgrades.power++;
    saveAll();
    render();
  }
}

render();
</script>

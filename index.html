<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
h2 { font-size: 24px; }
#status { margin-bottom: 8px; font-size: 20px; }
#log { margin-bottom: 16px; font-size: 16px; }

#storage {
margin-top: 20px;
padding-top: 10px;
border-top: 1px solid #0f0;
color: #ffcc66;
}

button {
display: block;
margin: 12px auto;
padding: 16px 0;
width: 180px;
background: #222;
color: #0f0;
border: 1px solid #0f0;
font-size: 18px;
}

#log div { margin-bottom: 4px; color: #fff; }
.log-new { font-weight: bold; }
.log-damage { color: #f55; }
.log-scrap { color: #ffcc66; }
.log-divider { color: #888; text-align: center; }

#top {
  height: 200px;
  overflow-y: auto; /* ←ログだけスクロール */
  padding: 16px;
}

#bottom {
  flex: 1;
  border-top: 1px solid #0f0;
  padding: 12px;
  background: #111;
}

#actions {
  display: flex;
  flex-direction: column;
  align-items: center;
}

</style>
</head>
<body>
<div id="top">
  <h2>Nikotaya Mining Roguelike</h2>
  <div id="status"></div>
  <div id="log"></div>
</div>

<div id="bottom">
  <div id="actions"></div>
  <div id="storage"></div>
</div>
<script>
let state = {
  hp: 10,
  maxHp: 10,
  scrap: 0,
  totalScrap: 0,
  floor: 1,
  log: [],
  mode: "home" // home / explore / event / return / dead
};

// 永続読み込み
let saved = localStorage.getItem("totalScrap");
if (saved) state.totalScrap = parseInt(saved) || 0;

function addLog(text, type = "normal") {
  let prefix = `【${state.floor}階】`;
  state.log.unshift({ text: prefix + text, type });
  state.log = state.log.slice(0, 12);
}

function render() {
  document.getElementById("status").innerText =
    `HP:${state.hp}/${state.maxHp} | Scrap:${state.scrap} | Floor:${state.floor}`;

  document.getElementById("storage").innerText =
    `倉庫：スクラップ ${state.totalScrap}`;

  let logHTML = "";
  state.log.forEach((entry, i) => {
    let cls = "";
    if (i === 0) cls += "log-new ";
    if (entry.type === "damage") cls += "log-damage ";
    if (entry.type === "scrap") cls += "log-scrap ";
    if (entry.type === "divider") cls += "log-divider ";
    logHTML += `<div class="${cls}">${entry.text}</div>`;
  });
  document.getElementById("log").innerHTML = logHTML;

  let actions = document.getElementById("actions");
  actions.innerHTML = "";

  switch (state.mode) {
    case "home":
      createButton("採掘開始", startRun);
      break;

    case "explore":
      createButton("採掘する", next);
      break;

    case "event":
      createButton("開ける", openChest);
      createButton("無視する", ignoreChest);
      break;

    case "return":
      createButton("帰還する", doReturn);
      createButton("続行する", continueRun);
      break;

    case "dead":
      createButton("帰還する", forceReturn);
      break;
  }
}

function createButton(text, fn) {
  let b = document.createElement("button");
  b.innerText = text;
  b.onclick = fn;
  document.getElementById("actions").appendChild(b);
}

// ■ホーム→開始
function startRun() {
  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];
  state.mode = "explore";

  addLog("採掘開始！");
  render();
}

function next() {
  state.floor++;

  if (state.floor % 10 === 0) {
    addLog(`－－－ ${state.floor}階層 －－－`, "divider");
    state.mode = "return";
    render();
    return;
  }

  let r = Math.random();

  if (r < 0.5) {
    let gain = Math.floor(Math.random() * 3) + 1;
    state.scrap += gain;
    addLog(`採掘した スクラップ+${gain}`, "scrap");

  } else if (r < 0.75) {
    let dmg = Math.floor(Math.random() * 3) + 1;
    state.hp -= dmg;
    addLog(`落石！ ${dmg} ダメージ`, "damage");

  } else {
    state.mode = "event";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  checkDeath();
  render();
}

function openChest() {
  let r = Math.random();

  if (r < 0.6) {
    let gain = Math.floor(Math.random() * 5) + 2;
    state.scrap += gain;
    addLog(`資源を発見！ +${gain}`, "scrap");

  } else {
    let dmg = Math.floor(Math.random() * 5) + 2;
    state.hp -= dmg;
    addLog(`トラップ作動！ ${dmg} ダメージ`, "damage");
  }

  checkDeath();

  state.mode = "explore";
  render();
}

function ignoreChest() {
  addLog("コンテナを無視した");
  state.mode = "explore";
  render();
}

function checkDeath() {
  if (state.hp <= 0) {
    addLog("HPが0になった…");
    state.mode = "dead";
  }
}

// ■通常帰還（10階）
function doReturn() {
  let carry = Math.floor(state.scrap / 2);

  state.totalScrap += carry;
  localStorage.setItem("totalScrap", state.totalScrap);

  addLog(`帰還した。スクラップ${carry}を持ち帰った`, "scrap");

  // ★ここ追加
  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode = "home";
  render();
}

// ■死亡時の帰還
function forceReturn() {
  addLog("撤退した…");

  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode = "home";
  render();
}

function continueRun() {
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// 初期表示
render();
</script>
</body>
</html>

</head>

<body>

<div id="top">
  <div id="header">
    <h2 style="margin:0 0 6px;display:flex;justify-content:space-between;align-items:center;">Nikotaya Mining Roguelike <span id="se-toggle" onclick="toggleSE()" style="cursor:pointer;font-size:32px;padding-right:24px;"></span></h2>
    <div id="status"></div>
    <div id="buff-container"></div>
  </div>
  <div id="current-event">
    <div id="current-event-icon"></div>
    <div id="current-event-text">採掘を開始しよう！</div>
  </div>
  <div id="log"></div>
</div>

<div id="actions"></div>

<div id="bottom">
  <div id="storage"></div>
  <div id="statusRow">
    <div id="playerStatus"></div>
    <div id="itemBox"></div>
  </div>
  <div id="shop"></div>
  <div id="stats"></div>
</div>

<script>
// --- 永続データ読み込み ---
let savedUpgrades  = JSON.parse(localStorage.getItem("upgrades") || '{"hp":0,"power":0,"potionHeal":0}');
if(savedUpgrades.potionHeal === undefined) savedUpgrades.potionHeal = 0;
let savedScrap     = parseInt(localStorage.getItem("totalScrap")) || 0;
let savedName      = localStorage.getItem("playerName") || "プレイヤー";
let savedBestFloor = parseInt(localStorage.getItem("bestFloor")) || 1;
let savedItems     = JSON.parse(localStorage.getItem("items") || "[]");
let savedSeOn      = localStorage.getItem("seOn") !== "false"; // デフォルトON
let savedStats     = JSON.parse(localStorage.getItem("stats") || JSON.stringify({
  runs: 0, deaths: 0, floors: 0, scrap: 0, damage: 0,
  potions: 0, goddess: 0, goldenMole: 0, thiefMole: 0
}));
// 旧データに項目がない場合の補完
["runs","deaths","floors","scrap","damage","potions","goddess","goldenMole","thiefMole"].forEach(k => {
  if(savedStats[k] === undefined) savedStats[k] = 0;
});

let state = {
  name:       savedName,
  hp:         10 + savedUpgrades.hp,
  maxHp:      10 + savedUpgrades.hp,
  mp:         0,
  maxMp:      0,
  power:      1  + savedUpgrades.power,
  skills:     [],
  items:      savedItems,   // 消耗品アイテム（最大5個）
  scrap:      0,
  totalScrap: savedScrap,
  floor:      1,
  bestFloor:  savedBestFloor,
  log:        [],
  mode:       "home",
  upgrades:   savedUpgrades,
  lastResult: null,
  buffs: [],  // { id, name, turns, isBad, onTurn: fn }
  moleBlock: -1,  // モグラが発生した30階ブロック番号
  seOn: savedSeOn,
  stats: savedStats,  // 永続累計統計
  runStats: {         // ラン中の一時記録
    floors: 0, scrap: 0, damage: 0,
    potions: 0, goddess: 0, goldenMole: 0, thiefMole: 0
  }
};

// --- バフ管理 ---
function applyBuff(buff){
  // 同じidがあれば上書き、なければ追加
  let idx = state.buffs.findIndex(b => b.id === buff.id);
  if(idx >= 0) state.buffs[idx] = buff;
  else state.buffs.push(buff);
}

function tickBuffs(){
  // 階層が上がった瞬間に発動・ターン消費
  state.buffs.forEach(b => {
    if(b.onTurn) b.onTurn();
    b.turns--;
  });
  // 0以下になったバフを削除
  state.buffs = state.buffs.filter(b => b.turns > 0);
}

function clearBuffs(){
  state.buffs = [];
  state.moleBlock = -1;
}

// --- 毒を付与する関数 ---
function applyPoison(turns){
  applyBuff({
    id: "poison",
    name: "🩸 毒",
    turns: turns,
    isBad: true,
    onTurn: () => {
      let d = Math.max(1, Math.floor(state.maxHp * 0.1));
      // 毒で死なない：HP1を必ず残す
      d = Math.min(d, state.hp - 1);
      if(d > 0){
        damage(d);
        addLog(`🩸 毒ダメージ ${d}`, "damage");
      }
    }
  });
}

// --- アイテム定義マスタ ---
const ITEM_DEF = {
  hp3: {
    name: "ポーション",
    get desc(){ return `HP を ${getPotionHealValue()} 回復する`; },
    usableModes: null
  },
  antidote: {
    name: "毒消し草",
    desc: "毒状態を治す",
    usableModes: null
  }
};

// --- SE（Web Audio API） ---
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

async function initAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
  if(audioCtx.state === "suspended") await audioCtx.resume();
}

// 採掘音：ザクッ（こもった土の音）
async function playDigSound(){
  await initAudio();
  const duration = 0.08;
  const bufferSize = audioCtx.sampleRate * duration;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const src    = audioCtx.createBufferSource();
  src.buffer   = buffer;
  const filter = audioCtx.createBiquadFilter();
  filter.type  = "lowpass";
  filter.frequency.value = 800;
  const gain   = audioCtx.createGain();
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  src.start();
}

// 回復音：ポチョン（清涼感・神秘感）
async function playHealSound(){
  await initAudio();
  const duration = 0.2;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "sine";
  osc.frequency.setValueAtTime(300, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);

  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + duration);
}

// フォアグラウンド復帰時にAudioContextを自動resume
document.addEventListener("visibilitychange", () => {
  if(document.visibilityState === "visible" && audioCtx) {
    audioCtx.resume();
  }
});

// SE管理マスタ（将来ここに追加していく）
const SE = {
  dig:  playDigSound,
  heal: playHealSound,
};

async function playSE(name){
  if(!state.seOn) return;
  try {
    if(SE[name]) await SE[name]();
  } catch(e) {
    console.warn("SE error:", e);
  }
}

// --- SEトグル ---
function toggleSE(){
  state.seOn = !state.seOn;
  localStorage.setItem("seOn", state.seOn);
  if(state.seOn) playSE("dig"); // ONに戻した時にプレビュー音
  render();
}

// --- データ全削除 ---
function deleteAllData(){
  if(confirm("全てのプレイデータを削除しますが本当によろしいですか？")){
    localStorage.clear();
    location.reload();
  }
}

// --- 保存ヘルパー ---
function saveAll() {
  localStorage.setItem("totalScrap", state.totalScrap);
  localStorage.setItem("upgrades",   JSON.stringify(state.upgrades));
  localStorage.setItem("bestFloor",  state.bestFloor);
  localStorage.setItem("items",      JSON.stringify(state.items));
  localStorage.setItem("stats",      JSON.stringify(state.stats));
}

// ランの統計を永続に加算してリセット
function commitStats(died, carry=0){
  state.stats.runs++;
  if(died) state.stats.deaths++;
  state.stats.floors     += state.runStats.floors;
  state.stats.scrap      += carry;  // 実際に持ち帰った分のみ
  state.stats.damage     += state.runStats.damage;
  state.stats.potions    += state.runStats.potions;
  state.stats.goddess    += state.runStats.goddess;
  state.stats.goldenMole += state.runStats.goldenMole;
  state.stats.thiefMole  += state.runStats.thiefMole;
  // runStatsリセット
  state.runStats = { floors:0, scrap:0, damage:0, potions:0, goddess:0, goldenMole:0, thiefMole:0 };
}

// --- コスト ---
function getHpCost()      { return 30  + state.upgrades.hp    * 20; }
function getPowerCost()   { return 100 + state.upgrades.power * 50; }
function getPotionHealCost() { return Math.floor(2000 * Math.pow(4, state.upgrades.potionHeal)); }
function getPotionHealValue(){ return 3 + state.upgrades.potionHeal; }

// --- HP処理 ---
function damage(d){
  let actual = Math.min(d, state.hp); // 実際に受けたダメージ
  state.hp = Math.max(0, state.hp - d);
  state.runStats.damage += actual;
}
function heal(v)  { state.hp = Math.min(state.maxHp, state.hp + v); }

// --- ログテキスト色付け ---
function colorizeLog(text, type){
  // ダメージ数値を赤に（「X ダメージ」）
  text = text.replace(/(\d+)( ダメージ)/g,
    '<span style="color:#f55;font-weight:bold;">$1</span>$2');
  // スクラップ数値をオレンジに（「+X」）
  text = text.replace(/(\+\d+)/g,
    '<span style="color:#ffcc66;font-weight:bold;">$1</span>');
  // HP回復を黄緑に（全タイプ共通）
  text = text.replace(/(HP\+\d+|HP \+\d+)/g,
    '<span style="color:#aaff66;font-weight:bold;">$1</span>');
  // subのダメージ・回復も色付け
  if(type === "sub"){
    text = text.replace(/(\d+)( ダメージ)/g,
      '<span style="color:#f55;font-weight:bold;">$1</span>$2');
    text = text.replace(/(HP \+\d+)/g,
      '<span style="color:#aaff66;font-weight:bold;">$1</span>');
    // スクラップ捨てはオレンジ
    text = text.replace(/スクラップ (\d+)/g,
      'スクラップ <span style="color:#ffcc66;font-weight:bold;">$1</span>');
  }
  return text;
}

// --- 絵文字取得 ---
function getEmoji(text, type){
  if(type==="divider")     return "🚪";
  if(type==="damage")      return text.includes("毒") ? "🩸" : "💥";
  if(type==="scrap")       return "⛏️";
  if(type==="heal")        return "💤";
  if(type==="loss")        return "🕳️";
  if(type==="sub")         return "";
  if(text.includes("採掘開始"))     return "⛏️";
  if(text.includes("コンテナ"))     return "📦";
  if(text.includes("鉱脈"))         return "💎";
  if(text.includes("キノコ"))       return "🍄";
  if(text.includes("帰還"))         return "🏠";
  if(text.includes("HPが0"))        return "💀";
  if(text.includes("一休み"))       return "💤";
  if(text.includes("亀裂"))         return "🕳️";
  if(text.includes("コウモリ"))     return "🦇";
  if(text.includes("女神"))         return "🗿";
  return "📋";
}

// --- ログ ---
// state.log = [ { floor, lines: [{text, type, emoji}] }, ... ]
// subはその階の最新エントリのlinesに追加、それ以外は新エントリ

function addLog(text, type="normal"){
  let emoji = getEmoji(text, type);

  if(type === "sub"){
    // 最新エントリのlinesに追加
    if(state.log.length > 0){
      state.log[0].lines.push({text, type, emoji});
    }
    return;
  }

  // 新しい階層エントリを先頭に追加
  let entry = {
    floor: state.floor,
    type,           // エントリ全体の代表タイプ（アイコン・色に使う）
    lines: [{text, type, emoji}]
  };
  state.log.unshift(entry);
  state.log = state.log.slice(0, 10); // 10階層分保持
}

// --- 描画 ---
function render(){
  // HP色：満タン=緑、50%以下=黄、25%以下=赤
  let hpRatio = state.maxHp > 0 ? state.hp / state.maxHp : 1;
  let hpColor = hpRatio > 0.5 ? "#0f0" : hpRatio > 0.25 ? "#ff0" : "#f55";
  document.getElementById("se-toggle").innerText = state.seOn ? "🔔" : "🔕";
  document.getElementById("status").innerHTML =
    `<span style="color:${hpColor}">HP:${state.hp}/${state.maxHp}</span> | MP:${state.mp}/${state.maxMp} | スクラップ:<span style="color:#ffcc66;">${state.scrap.toLocaleString()}</span> | 現在地:${state.floor}階`;

  // バフ・デバフ表示
  let buffHTML = "";
  if(state.buffs.length > 0){
    state.buffs.forEach(b => {
      let cls = b.isBad ? "buff-bad" : "buff-good";
      buffHTML += `<div class="buff-badge ${cls}">${b.name} : ${b.turns}T</div>`;
    });
  }
  document.getElementById("buff-container").innerHTML = buffHTML;

  document.getElementById("storage").innerText =
    `倉庫：スクラップ ${state.totalScrap.toLocaleString()}`;

  document.getElementById("playerStatus").innerHTML =
`<span onclick="changeName()" style="cursor:pointer;">名前：${state.name} ✏️</span>
最大HP：${state.maxHp}
最大MP：${state.maxMp}
採掘力：${state.power}
スキル：${state.skills.length ? state.skills.join(",") : "なし"}
最高到達階：${state.bestFloor}階`.split("\n").map(l => `<div>${l}</div>`).join("");

  // アイテム欄
  let itemHTML = `<div onclick="openItemMenu()" style="cursor:pointer;text-decoration:underline;">▼アイテム 👆</div>`;
  for(let i = 0; i < 5; i++){
    let item = state.items[i];
    if(item){
      itemHTML += `<div>${i+1}. ${item.name}</div>`;
    } else {
      itemHTML += `<div style="color:#444;">${i+1}. ────</div>`;
    }
  }
  document.getElementById("itemBox").innerHTML = itemHTML;

  // リザルト画面（完全独立描画）
  if(state.mode === "result" && state.lastResult){
    let r = state.lastResult;
    let survived = r.survived ? "帰還成功 🎉" : "力尽きた… 💀";
    document.getElementById("current-event-icon").innerText = r.survived ? "🎉" : "💀";
    let carryNote = r.goddess ? "（女神の加護・全額）" : "（半分）";
    document.getElementById("current-event-text").innerHTML = `
<div style="color:#ff0;font-size:28px;margin-bottom:6px;">── リザルト ──</div>
<div>${survived}</div>
<div>到達階層：${r.floor} 階</div>
<div style="color:#ffcc66;">持ち帰ったスクラップ：${r.carry.toLocaleString()} ${carryNote}</div>
<div style="color:#aaa;">最高到達階：${state.bestFloor} 階</div>
`;
    document.getElementById("log").innerHTML = "";
    document.getElementById("actions").innerHTML = "";
    btn("ホームへ戻る", goHome, "main");
    document.getElementById("shop").innerHTML = "";
    return;
  }

  // --- current-event：最新エントリの全ラインを表示 ---
  if(state.log.length > 0){
    let entry = state.log[0];
    let firstLine = entry.lines[0];
    // アイコンは先頭ラインの絵文字
    document.getElementById("current-event-icon").innerText = firstLine.emoji || "📋";

    let eventHTML = "";
    entry.lines.forEach((line, i) => {
      let color = "";
      if(line.type==="damage")      color = "color:#f55;";
      else if(line.type==="scrap")  color = "color:#ffcc66;";
      else if(line.type==="heal")   color = "color:#aaff66;";
      else if(line.type==="loss")   color = "color:#f55;";
      else if(line.type==="divider")color = "color:#fff;";
      else if(line.type==="sub")    color = "color:#aaa;";

      let colored = colorizeLog(line.text, line.type);

      if(line.type === "divider"){
        // dividerは改行で説明文を小さく
        colored = colored.replace('\n', `</span><br><span style='font-size:22px;color:#aaa;'>`);
        eventHTML += `<div style="${color}font-size:30px;">${colored}</span></div>`;
      } else if(line.type === "sub"){
        eventHTML += `<div style="color:#aaa;font-size:26px;padding-left:1em;">→ ${colored}</div>`;
      } else {
        let fs = i === 0 ? "30px" : "26px";
        eventHTML += `<div style="${color}font-size:${fs};">${colored}</div>`;
      }
    });
    document.getElementById("current-event-text").innerHTML = eventHTML;
  }

  // --- 履歴ログ：最新エントリ以外を階層単位で表示 ---
  let logHTML = "";
  state.log.slice(1).forEach((entry) => {
    entry.lines.forEach((line, i) => {
      let cls = "";
      if(line.type==="divider") cls = "log-divider";
      if(line.type==="loss")    cls = "log-loss";
      let colored = colorizeLog(line.text, line.type);

      if(line.type === "sub"){
        logHTML += `<div style="padding-left:2em;color:#aaa;font-size:22px;">→ ${colored}</div>`;
      } else if(line.type === "divider"){
        colored = colored.split('\n').join(`<br><span style='font-size:20px;color:#aaa;'>`);
        logHTML += `<div class="${cls}">${colored}</span></div>`;
      } else {
        // 先頭ラインには【X階】プレフィックス
        let prefix = i === 0 ? `<span style="color:#888;">【${entry.floor}階】</span>` : "";
        logHTML += `<div class="${cls}">${prefix}${line.emoji ? line.emoji+" " : ""}${colored}</div>`;
      }
    });
  });
  document.getElementById("log").innerHTML = logHTML;

  let a = document.getElementById("actions");
  a.innerHTML = "";

  switch(state.mode){
    case "home":
      btn("採掘開始", startRun, "main");
      break;
    case "explore":
      btn("採掘する", next, "main");
      break;
    case "event":
      btn("開ける", openChest, "#ffcc66", "rgba(255,204,102,0.1)");
      btn("無視する", ignoreChest, "#666",    "transparent");
      break;
    case "event_vein":
      btn("掘る", digVein, "#ffcc66", "rgba(255,204,102,0.1)");
      btn("無視して進む", ignoreEvent, "#666",    "transparent");
      break;
    case "event_mushroom":
      btn("食べる", eatMushroom, "#ffcc66", "rgba(255,204,102,0.1)");
      btn("無視する", ignoreEvent, "skip");
      break;
    case "event_bat":
      renderBatEvent();
      break;
    case "event_goddess":
      btn("スクラップが欲しい", goddessScrap, "#0ff",    "rgba(0,255,255,0.1)");
      btn("ホームに帰りたい", goddessReturn, "#f55",    "rgba(245,85,85,0.1)");
      break;
    case "return":
      btn("続行する", continueRun, "main");
      btn("帰還する", confirmReturn, "#f55",    "rgba(245,85,85,0.1)");
      break;
    case "dead":
      btn("帰還する", forceReturn, "#f55",    "rgba(245,85,85,0.1)");
      break;
    case "item":
      renderItemMenu();
      btn("戻る", closeItemMenu, "#666",    "transparent");
      break;
  }

  let shopHTML = "";
  if(state.mode === "home"){
    let itemFull = state.items.length >= 5;
    let shopStyle = "border-color:#f9f;color:#f9f;background:rgba(255,153,255,0.1);width:100%;";
    let maxStyle   = "border-color:#666;color:#666;background:transparent;opacity:0.5;width:100%;";
    let disabledStyle = itemFull ? "opacity:0.4;" : "";
    let potionMax  = state.upgrades.potionHeal >= 7;
    let itemFullMsg = itemFull ? '<span style="color:#f55;font-size:20px;margin-left:8px;">※持ち物がいっぱい</span>' : "";
    let btnStyle = shopStyle + "height:auto;padding:12px 8px;";
    let btnStyleDisabled = btnStyle + disabledStyle;
    let priceSpan = (val) => `スクラップ <span style="color:#ffcc66;font-size:26px;">${val}</span>`;
    let descStyle = 'style="font-size:18px;"';
    shopHTML = `
<div>▼ショップ</div>
<div style="color:#888;margin:6px 0;">[ 消耗品 ] ${itemFullMsg}</div>
<button onclick="buyPotion()" style="${btnStyleDisabled}">ポーション<br><span ${descStyle}>HP+${getPotionHealValue()}</span><br>${priceSpan(10)}</button>
<button onclick="buyAntidote()" style="${btnStyleDisabled}">毒消し草<br><span ${descStyle}>毒を治す</span><br>${priceSpan(10)}</button>
<div style="color:#888;margin:6px 0;">[ 永続強化 ]</div>
${potionMax
  ? `<button disabled style="${maxStyle}height:110px;box-sizing:border-box;">ポーション強化<br><span ${descStyle}>MAX（上限+${getPotionHealValue()}）</span></button>`
  : `<button onclick="buyPotionHeal()" style="${btnStyle}">ポーション強化<br><span ${descStyle}>回復量+1</span><br>${priceSpan(getPotionHealCost().toLocaleString())}</button>`
}
<button onclick="buyHp()" style="${btnStyle}">最大HP +1<br><span ${descStyle}>&nbsp;</span><br>${priceSpan(getHpCost().toLocaleString())}</button>
<button onclick="buyPower()" style="${btnStyle}">採掘力 +1<br><span ${descStyle}>&nbsp;</span><br>${priceSpan(getPowerCost().toLocaleString())}</button>
`;
  }
  document.getElementById("shop").innerHTML = shopHTML;

  // 統計表示（ホームのみ）
  let statsEl = document.getElementById("stats");
  if(statsEl){
    if(state.mode === "home"){
      let s = state.stats;
      statsEl.innerHTML = `
<div style="margin-top:16px;padding-top:10px;border-top:1px solid rgba(0,255,0,0.3);color:#888;font-size:22px;">
  <div style="color:#0f0;font-size:26px;margin-bottom:8px;">▼ 統計</div>
  <div>最高到達階：<span style="color:#fff;">${state.bestFloor.toLocaleString()} 階</span></div>
  <div>採掘完了回数：<span style="color:#fff;">${s.runs.toLocaleString()} 回</span></div>
  <div>死亡回数：<span style="color:#fff;">${s.deaths.toLocaleString()} 回</span></div>
  <div>進んだ階層累計：<span style="color:#fff;">${s.floors.toLocaleString()} 階</span></div>
  <div>入手スクラップ累計：<span style="color:#ffcc66;">${s.scrap.toLocaleString()}</span></div>
  <div>受けたダメージ累計：<span style="color:#f55;">${s.damage.toLocaleString()}</span></div>
  <div>飲んだポーション数：<span style="color:#fff;">${s.potions.toLocaleString()} 個</span></div>
  <div>女神像に会った回数：<span style="color:#fff;">${s.goddess.toLocaleString()} 回</span></div>
  <div>金モグラに会った回数：<span style="color:#fff;">${s.goldenMole.toLocaleString()} 回</span></div>
  <div>泥棒モグラに会った回数：<span style="color:#fff;">${s.thiefMole.toLocaleString()} 回</span></div>
  <div style="height:120px;"></div>
  <div style="display:flex;justify-content:flex-end;">
    <button onclick="deleteAllData()" style="border-color:#f55;color:#f55;background:rgba(245,85,85,0.1);min-width:120px;max-width:160px;font-size:22px;padding:12px 0;">データ削除</button>
  </div>
</div>`;
    } else {
      statsEl.innerHTML = "";
    }
  }
}

function btn(t, f, color="#0f0", bg="rgba(0,255,0,0.1)"){
  let b = document.createElement("button");
  b.innerText = t;
  b.onclick   = f;
  b.style.borderColor = color;
  b.style.color       = color;
  b.style.background  = bg;
  b.style.boxShadow   = `0 0 10px ${color}66`;
  document.getElementById("actions").appendChild(b);
}

// --- アイテムメニュー ---
let prevMode = "explore";

function openItemMenu(){
  if(state.mode === "result") return;
  prevMode = state.mode;
  state.mode = "item";
  render();
}

function closeItemMenu(){
  state.mode = prevMode;
  render();
}

function renderItemMenu(){
  let a = document.getElementById("actions");
  let isHome = prevMode === "home";

  if(state.items.length === 0){
    let d = document.createElement("div");
    d.innerText = "アイテムがない";
    d.style.color = "#888";
    d.style.margin = "8px";
    a.appendChild(d);
    return;
  }

  state.items.forEach((item, i) => {
    let def = ITEM_DEF[item.effect];
    let wrap = document.createElement("div");
    wrap.style.cssText = "display:flex;align-items:center;gap:8px;width:100%;margin:4px 0;";

    let info = document.createElement("div");
    info.style.cssText = "flex:1;font-size:24px;color:#aaffaa;";
    info.innerHTML = `<b>${i+1}. ${item.name}</b>`;

    let desc = document.createElement("div");
    desc.style.cssText = "flex:2;font-size:20px;color:#888;text-align:center;";
    desc.innerText = def ? def.desc : "";

    let actionBtn = document.createElement("button");
    actionBtn.style.cssText = "min-width:100px;max-width:120px;font-size:22px;padding:10px 0;";

    if(isHome){
      actionBtn.innerText = "捨てる";
      actionBtn.style.cssText += "border-color:#f55;color:#f55;background:rgba(245,85,85,0.1);";
      actionBtn.onclick = () => discardItem(i);
    } else {
      let usable = !def.usableModes || def.usableModes.includes(prevMode);
      actionBtn.innerText = "使う";
      actionBtn.style.cssText += `border-color:#0ff;color:#0ff;background:rgba(0,255,255,0.1);${usable ? "" : "opacity:0.4;"}`;
      actionBtn.disabled = !usable;
      if(usable) actionBtn.onclick = () => useItem(i);
    }

    wrap.appendChild(info);
    wrap.appendChild(desc);
    wrap.appendChild(actionBtn);
    a.appendChild(wrap);
  });
}

function useItem(index){
  let item = state.items[index];
  let def  = ITEM_DEF[item.effect];
  if(!def){ return; }

  // 効果発動
  if(item.effect === "hp3"){
    let v = getPotionHealValue();
    heal(v);
    playSE("heal");
    state.runStats.potions++;
    addLog(`ポーションを使った！ HP +${v}`, "scrap");
  } else if(item.effect === "antidote"){
    let idx = state.buffs.findIndex(b => b.id === "poison");
    if(idx >= 0){
      state.buffs.splice(idx, 1);
      playSE("heal");
      addLog("毒消し草を使った！ 毒が治った", "heal");
    } else {
      addLog("毒消し草を使った（毒状態ではなかった）", "normal");
    }
  }

  // 消費して上詰め
  state.items.splice(index, 1);
  saveAll();
  state.mode = prevMode;
  render();
}

function discardItem(index){
  let item = state.items[index];
  if(confirm(`「${item.name}」を本当に捨てますか？`)){
    state.items.splice(index, 1);
    saveAll();
    render();
  }
}

// --- 名前変更 ---
function changeName(){
  let n = prompt("名前入力");
  if(n){
    state.name = n;
    localStorage.setItem("playerName", n);
  }
  render();
}

// --- 採掘開始 ---
function startRun(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  clearBuffs();
  state.runStats = { floors:0, scrap:0, damage:0, potions:0, goddess:0, goldenMole:0, thiefMole:0 };
  state.mode  = "explore";
  addLog("採掘開始！");
  render();
}

// --- 採掘量計算 ---
function calcScrap(){
  let bonus    = Math.floor((state.floor-1)/10) + 1;
  let base     = state.power * bonus;
  let variance = Math.floor(base * (Math.random() - 0.5));
  return Math.max(1, base + variance);
}

// --- 階層補正ヘルパー ---
function floorDmgBonus()  { return Math.floor(state.floor / 10); }
function floorHealBonus() { return Math.floor(state.floor / 20); }

// --- 探索 ---
function next(){
  playSE("dig");
  state.floor++;
  state.runStats.floors++;

  // バフ・デバフのターン処理（階層上昇時）
  tickBuffs();
  if(state.hp <= 0){ checkDeath(); render(); return; }

  if(state.floor % 30 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\n女神像がある…`, "divider");
    state.mode = "event_goddess";
    render();
    return;
  }

  if(state.floor % 10 === 0){
    addLog(`－－－ ${state.floor}階層 －－－\nスクラップを半分支払えば帰還できそうだ`, "divider");
    state.mode = "return";
    render();
    return;
  }

  // --- 軽(70%) / 重(30%) の2段階抽選 ---
  const LIGHT_EVENTS = [
    // 採掘 60%
    { w: 60, fn: () => {
      let g = calcScrap();
      state.scrap += g;
      addLog(`採掘した スクラップ +${g.toLocaleString()}`, "scrap");
    }},
    // 落石 20%
    { w: 20, fn: () => {
      let d = Math.floor(Math.random()*3) + 1 + floorDmgBonus();
      damage(d);
      addLog(`落石！ ${d} ダメージ`, "damage");
    }},
    // 一休み 10%
    { w: 10, fn: () => {
      let h = Math.floor(Math.random()*2) + 1 + floorHealBonus();
      heal(h);
      playSE("heal");
      addLog(`一休みした HP+${h}`, "heal");
    }},
    // 亀裂 10%
    { w: 10, fn: () => {
      let lost = Math.min(calcScrap(), state.scrap);
      state.scrap = Math.max(0, state.scrap - lost);
      addLog(`亀裂の隙間にスクラップを落としてしまった スクラップ -${lost.toLocaleString()}`, "loss");
    }},
    // モグラ 1%（30階ブロック内で1回まで）
    { w: 1,
      condition: () => {
        let block = Math.floor((state.floor - 1) / 30);
        return state.moleBlock !== block;
      },
      fn: () => {
        let block = Math.floor((state.floor - 1) / 30);
        state.moleBlock = block;
        if(Math.random() < 0.5){
          // 金モグラ
          let gain = Math.floor(state.scrap / 2);
          state.scrap += gain;
          state.runStats.goldenMole++;
          addLog(`金モグラだ！ スクラップ +${gain.toLocaleString()}`, "scrap");
        } else {
          // 泥棒モグラ
          let lost = Math.floor(state.scrap / 2);
          state.scrap = Math.max(0, state.scrap - lost);
          state.runStats.thiefMole++;
          addLog(`泥棒モグラだ！ スクラップ -${lost.toLocaleString()}`, "loss");
        }
      }
    },
  ];

  const HEAVY_EVENTS = [
    { w: 20, fn: () => { state.mode = "event";          addLog("コンテナを発見した！"); }},
    { w: 40, fn: () => { state.mode = "event_vein";     addLog("鉱脈だ！だけど地盤が脆そうだ…"); }},
    { w: 40, fn: () => { state.mode = "event_mushroom"; addLog("謎のキノコだ！"); }},
    { w: 30, fn: () => { state.mode = "event_bat";      addLog("コウモリの群れだ！"); }},
  ];

  if(Math.random() < 0.70){
    // 軽イベント：condition対応重み付き抽選
    let avail = LIGHT_EVENTS.filter(e => !e.condition || e.condition());
    if(avail.length === 0) avail = LIGHT_EVENTS.filter(e => !e.condition);
    let totalW = avail.reduce((s, e) => s + e.w, 0);
    let pick = Math.random() * totalW;
    let ev = avail[avail.length - 1];
    for(let e of avail){ pick -= e.w; if(pick <= 0){ ev = e; break; } }
    ev.fn();
    checkDeath();
    render();
  } else {
    // 重イベント：condition対応重み付き抽選
    let availH = HEAVY_EVENTS.filter(e => !e.condition || e.condition());
    if(availH.length === 0) availH = HEAVY_EVENTS.filter(e => !e.condition);
    let totalHW = availH.reduce((s, e) => s + e.w, 0);
    let pickH = Math.random() * totalHW;
    let ev = availH[availH.length - 1];
    for(let e of availH){ pickH -= e.w; if(pickH <= 0){ ev = e; break; } }
    ev.fn();
    if(state.mode !== "explore"){ render(); return; }
    checkDeath();
    render();
  }
}

// --- コンテナ ---
function openChest(){
  let r = Math.random();
  if(r < 0.70){
    // 成功：calcScrap() × 3
    let g = calcScrap() * 3;
    state.scrap += g;
    addLog(`資源を発見！ スクラップ +${g.toLocaleString()}`, "sub");
  } else if(r < 0.85){
    // 空っぽ 15%
    addLog("空っぽだった…", "sub");
  } else {
    // 罠 15%：最大HPの20%（切り上げ）
    let d = Math.ceil(state.maxHp * 0.2);
    damage(d);
    addLog(`罠だった！ ${d} ダメージ`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

function ignoreChest(){
  addLog("無視した", "sub");
  state.mode = "explore";
  render();
}

// --- コウモリイベント ---
function renderBatEvent(){
  let a = document.getElementById("actions");

  // 「音を立てて気をそらす」ボタン
  let lost = Math.floor(state.scrap * 0.1);
  let distractBtn = document.createElement("button");
  distractBtn.innerHTML = `音を立てて気をそらす<br><span style="font-size:22px;color:#ffcc66;">スクラップ -${lost}</span>`;
  distractBtn.style.cssText += ";border-color:#666;color:#666;background:transparent;box-shadow:0 0 10px #66666666;";
  if(state.scrap <= 0){
    distractBtn.disabled = true;
    distractBtn.style.opacity = "0.4";
  } else {
    distractBtn.onclick = batDistract;
    distractBtn.style.cssText += ";border-color:#ffcc66;color:#ffcc66;background:rgba(255,204,102,0.1);box-shadow:0 0 10px rgba(255,204,102,0.4);";
  }
  a.appendChild(distractBtn);

  // 「無理やり通る」ボタン（オレンジ）
  let forceBtn = document.createElement("button");
  forceBtn.innerText = "無理やり通る";
  forceBtn.style.cssText += ";border-color:#ffcc66;color:#ffcc66;background:rgba(255,204,102,0.1);box-shadow:0 0 10px rgba(255,204,102,0.4);";
  forceBtn.onclick = batForce;
  a.appendChild(forceBtn);
}

function batDistract(){
  let lost = Math.max(1, Math.floor(state.scrap * 0.1));
  state.scrap = Math.max(0, state.scrap - lost);
  addLog(`スクラップ ${lost.toLocaleString()} を投げて気をそらした`, "sub");
  state.mode = "explore";
  render();
}

function batForce(){
  if(Math.random() < 0.40){
    addLog("うまく切り抜けられた！", "sub");
  } else {
    let d = Math.ceil(state.maxHp * 0.1);
    damage(d);
    applyPoison(3);
    addLog(`コウモリに襲われた！ ${d} ダメージ＋毒3ターン`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 共通：無視して進む ---
function ignoreEvent(){
  addLog("無視した", "sub");
  state.mode = "explore";
  render();
}

// --- 鉱脈イベント ---
function digVein(){
  if(Math.random() < 0.5){
    let g = calcScrap() * 2;
    state.scrap += g;
    addLog(`鉱脈を掘り当てた！ スクラップ +${g.toLocaleString()}`, "sub");
  } else {
    let d = 3 + Math.floor(state.floor / 10);
    damage(d);
    addLog(`地盤が崩れた！ ${d} ダメージ`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- キノコイベント ---
function eatMushroom(){
  let r = Math.random();
  if(r < 0.40){
    applyPoison(2);
    addLog("苦い！ 毒を受けた（2ターン）", "sub");
  } else if(r < 0.80){
    let h = 3 + floorHealBonus();
    heal(h);
    playSE("heal");
    addLog(`甘い香り… HP +${h} 回復した`, "sub");
  } else if(r < 0.90){
    let back = Math.min(2, state.floor - 1);
    state.floor -= back;
    addLog(`錯乱した！ ${back}階層戻された`, "sub");
  } else {
    let lost = Math.floor(state.scrap * 0.1);
    state.scrap = Math.max(0, state.scrap - lost);
    addLog(`錯乱した！ スクラップ ${lost.toLocaleString()} をばらまいた`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 死亡 ---
function checkDeath(){
  if(state.hp <= 0){
    addLog("HPが0になった…", "sub");
    state.mode = "dead";
  }
}

// --- 帰還 ---
function confirmReturn(){
  if(confirm("本当に帰還しますか？（スクラップの半分を持ち帰ります）")){
    state.mode = "result";  // returnモードを先に抜ける
    doReturn();
  }
}

function doReturn(){
  let carry = Math.floor(state.scrap / 2);
  state.totalScrap += carry;
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(false, carry);
  saveAll();
  state.lastResult = { survived: true, floor: state.floor, carry };
  state.mode = "result";
  render();
}

function forceReturn(){
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(true);
  saveAll();
  state.lastResult = { survived: false, floor: state.floor, carry: 0 };
  state.mode = "result";
  render();
}

function goHome(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  state.lastResult = null;
  clearBuffs();
  state.mode  = "home";
  render();
}

// --- 女神像イベント ---
function goddessScrap(){
  state.runStats.goddess++;
  let gain = state.floor;
  state.scrap += gain;
  addLog(`女神の恵み！ スクラップ +${gain.toLocaleString()}`, "scrap");
  state.mode = "explore";
  render();
}

function goddessReturn(){
  state.runStats.goddess++;
  let carry = state.scrap;
  state.totalScrap += carry;
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  commitStats(false, carry);
  saveAll();
  state.lastResult = { survived: true, floor: state.floor, carry, goddess: true };
  state.mode = "result";
  render();
}

function continueRun(){
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// --- ショップ購入 ---
function buyPotion(){
  const cost = 10;
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ alert("持ち物がいっぱい"); return; }
  if(confirm(`スクラップ ${cost} でポーションを購入しますか？`)){
    state.totalScrap -= cost;
    state.items.push({ name: "ポーション", effect: "hp3" });
    saveAll();
    render();
  }
}

function buyAntidote(){
  const cost = 10;
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(state.items.length >= 5){ alert("持ち物がいっぱい"); return; }
  if(confirm(`スクラップ ${cost} で毒消し草を購入しますか？`)){
    state.totalScrap -= cost;
    state.items.push({ name: "毒消し草", effect: "antidote" });
    saveAll();
    render();
  }
}

function buyPotionHeal(){
  if(state.upgrades.potionHeal >= 7){ alert("これ以上強化できない"); return; }
  let cost = getPotionHealCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost.toLocaleString()} でポーション回復量を +1 強化しますか？（${getPotionHealValue()} → ${getPotionHealValue()+1}）`)){
    state.totalScrap -= cost;
    state.upgrades.potionHeal++;
    saveAll();
    render();
  }
}

function buyHp(){
  let cost = getHpCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap  -= cost;
    state.maxHp++;
    state.hp++;          // 現在HPも+1（即時反映）
    state.upgrades.hp++;
    saveAll();
    render();
  }
}

function buyPower(){
  let cost = getPowerCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap   -= cost;
    state.power++;
    state.upgrades.power++;
    saveAll();
    render();
  }
}

render();
</script>

</body>
</html>

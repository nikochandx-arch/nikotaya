<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  padding: 16px;
  font-size: 18px;
}
h2 { font-size: 24px; }
#status { margin-bottom: 8px; font-size: 20px; }
#log { margin-bottom: 16px; font-size: 16px; }
button {
display: block;
margin: 12px auto;
padding: 16px 0;
width: 180px;
background: #222;
color: #0f0;
border: 1px solid #0f0;
font-size: 18px;
}

#log div { margin-bottom: 4px; color: #fff; }
.log-new { font-weight: bold; }
.log-damage { color: #f55; }
.log-scrap { color: #ffcc66; }
.log-divider { color: #888; text-align: center; }
</style>
</head>
<body>
<h2>Nikotaya Mining Roguelike</h2>
<div id="status"></div>
<div id="log"></div>
<div id="actions"></div>
<script>
let state = {
  hp: 10,
  scrap: 0,        // 今回の探索で持ってる
  totalScrap: 0,   // 累計
  floor: 1,
  log: [],
  mode: "explore", // explore / event / return
};

// 永続読み込み
let saved = localStorage.getItem("totalScrap");
if (saved) state.totalScrap = parseInt(saved) || 0;

function addLog(text, type = "normal") {
  state.log.unshift({ text, type });
  state.log = state.log.slice(0, 10);
}

function render() {
  document.getElementById("status").innerText =
    `HP:${state.hp} | Scrap:${state.scrap} | Total:${state.totalScrap} | Floor:${state.floor}`;

  let logHTML = "";
  state.log.forEach((entry, i) => {
    let cls = "";
    if (i === 0) cls += "log-new ";
    if (entry.type === "damage") cls += "log-damage ";
    if (entry.type === "scrap") cls += "log-scrap ";
    if (entry.type === "divider") cls += "log-divider ";
    logHTML += `<div class="${cls}">${entry.text}</div>`;
  });
  document.getElementById("log").innerHTML = logHTML;

  let actions = document.getElementById("actions");
  actions.innerHTML = "";

  if (state.mode === "explore") {
    createButton("採掘する", next);

  } else if (state.mode === "event") {
    createButton("開ける", openChest);
    createButton("無視する", ignoreChest);

  } else if (state.mode === "return") {
    createButton("帰還する", doReturn);
    createButton("続行する", continueRun);
  }
}

function createButton(text, fn) {
  let b = document.createElement("button");
  b.innerText = text;
  b.onclick = fn;
  document.getElementById("actions").appendChild(b);
}

function next() {
  state.floor++;

  // ■10階ごと
  if (state.floor % 10 === 0) {
    addLog(`－－－ ${state.floor}階層 －－－`, "divider");
    state.mode = "return";
    render();
    return;
  }

  let r = Math.random();

  if (r < 0.5) {
    let gain = Math.floor(Math.random() * 3) + 1;
    state.scrap += gain;
    addLog(`採掘した スクラップ+${gain}`, "scrap");

  } else if (r < 0.75) {
    let dmg = Math.floor(Math.random() * 3) + 1;
    state.hp -= dmg;
    addLog(`落石！ ${dmg} ダメージ`, "damage");

  } else {
    state.mode = "event";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  checkDeath();
  render();
}

// ■コンテナ
function openChest() {
  let r = Math.random();

  if (r < 0.6) {
    let gain = Math.floor(Math.random() * 5) + 2;
    state.scrap += gain;
    addLog(`資源を発見！ +${gain}`, "scrap");

  } else {
    let dmg = Math.floor(Math.random() * 5) + 2;
    state.hp -= dmg;
    addLog(`トラップ作動！ ${dmg} ダメージ`, "damage");
  }

  checkDeath();

  state.mode = "explore";
  render();
}

function ignoreChest() {
  addLog("コンテナを無視した");
  state.mode = "explore";
  render();
}

// ■死亡処理（ログ保証）
function checkDeath() {
  if (state.hp <= 0) {
    addLog("HPが0になった…");
    gameOver();
  }
}

// ■帰還
function doReturn() {
  let carry = Math.floor(state.scrap / 2); // 半分持ち帰り

  state.totalScrap += carry;
  localStorage.setItem("totalScrap", state.totalScrap);

  addLog(`帰還した。スクラップ${carry}を持ち帰った（半分消費）`, "scrap");

  state.scrap = 0;
  state.mode = "explore";
  render();
}

function continueRun() {
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

function gameOver() {
  let actions = document.getElementById("actions");
  actions.innerHTML = "";
  createButton("リスタート", restart);
}

function restart() {
  state = {
    hp: 10,
    scrap: 0,
    totalScrap: state.totalScrap,
    floor: 1,
    log: [],
    mode: "explore"
  };
  addLog("採掘開始！");
  render();
}

// 初期化
addLog("採掘開始！");
render();
</script>
</body>
</html>

<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 32px;
}

h2 { font-size: 40px; }
#status { margin-bottom: 12px; font-size: 34px; }
#log { margin-bottom: 16px; font-size: 28px; }

#storage {
margin-top: 16px;
padding-top: 10px;
border-top: 2px solid #0f0;
color: #ffcc66;
font-size: 28px;
}

#playerStatus {
margin-top: 16px;
padding-top: 10px;
border-top: 2px solid #0f0;
color: #0ff;
font-size: 28px;
}

#shop {
margin-top: 16px;
padding-top: 10px;
border-top: 2px solid #0f0;
color: #ff99ff;
font-size: 28px;
}

#shop button {
width: 100%;
margin-top: 8px;
}

button {
min-width: 180px;
max-width: 260px;
flex: 1;
margin: 8px;
padding: 20px 0;
background: #222;
color: #0f0;
border: 2px solid #0f0;
font-size: 26px;
}

#log div { margin-bottom: 6px; color: #fff; }
.log-new { font-weight: bold; }
.log-damage { color: #f55; }
.log-scrap { color: #ffcc66; }
.log-divider { color: #888; text-align: center; }

#top {
height: 700px;
overflow-y: auto;
padding: 16px;
}

#actions {
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 12px;
border-top: 2px solid #0f0;
border-bottom: 2px solid #0f0;
padding: 12px;
}

#bottom {
flex: 1;
padding: 16px;
background: #111;
}
</style>

</head>

<body>

<div id="top">
  <h2>Nikotaya Mining Roguelike</h2>
  <div id="status"></div>
  <div id="log"></div>
</div>

<div id="actions"></div>

<div id="bottom">
  <div id="storage"></div>
  <div id="playerStatus"></div>
  <div id="shop"></div>
</div>

<script>
// --- 永続データ読み込み ---
let savedUpgrades  = JSON.parse(localStorage.getItem("upgrades") || '{"hp":0,"power":0}');
let savedScrap     = parseInt(localStorage.getItem("totalScrap")) || 0;
let savedName      = localStorage.getItem("playerName") || "プレイヤー";
let savedBestFloor = parseInt(localStorage.getItem("bestFloor")) || 1;

let state = {
  name:       savedName,
  hp:         10 + savedUpgrades.hp,
  maxHp:      10 + savedUpgrades.hp,
  mp:         0,
  maxMp:      0,
  power:      1  + savedUpgrades.power,
  skills:     [],
  scrap:      0,
  totalScrap: savedScrap,
  floor:      1,
  bestFloor:  savedBestFloor,
  log:        [],
  mode:       "home",
  upgrades:   savedUpgrades,
  lastResult: null  // リザルト用（帰還・死亡時にセット）
};

// --- 保存ヘルパー ---
function saveAll() {
  localStorage.setItem("totalScrap", state.totalScrap);
  localStorage.setItem("upgrades",   JSON.stringify(state.upgrades));
  localStorage.setItem("bestFloor",  state.bestFloor);
}

// --- コスト ---
function getHpCost()    { return 30  + state.upgrades.hp    * 20; }
function getPowerCost() { return 100 + state.upgrades.power * 50; }

// --- HP処理 ---
function damage(d){ state.hp = Math.max(0, state.hp - d); }
function heal(v)  { state.hp = Math.min(state.maxHp, state.hp + v); }

// --- ログ ---
function addLog(text, type="normal"){
  let prefix = (type==="divider" || type==="sub") ? "" : `【${state.floor}階】`;
  state.log.unshift({text: prefix+text, type});
  state.log = state.log.slice(0, 12);
}

// --- 描画 ---
function render(){
  document.getElementById("status").innerText =
    `HP:${state.hp}/${state.maxHp} | MP:${state.mp}/${state.maxMp} | スクラップ:${state.scrap} | 現在地:${state.floor}階`;

  document.getElementById("storage").innerText =
    `倉庫：スクラップ ${state.totalScrap}`;

  document.getElementById("playerStatus").innerText =
`名前：${state.name}
最大HP：${state.maxHp}
最大MP：${state.maxMp}
採掘力：${state.power}
スキル：${state.skills.length ? state.skills.join(",") : "なし"}
最高到達階：${state.bestFloor}階`;

  // リザルト画面（完全独立描画）
  if(state.mode === "result" && state.lastResult){
    let r = state.lastResult;
    let survived = r.survived ? "帰還成功" : "力尽きた…";
    document.getElementById("log").innerHTML = `
<div style="color:#ff0;font-size:36px;margin-bottom:12px;">── リザルト ──</div>
<div>${survived}</div>
<div>到達階層：${r.floor} 階</div>
<div style="color:#ffcc66;">持ち帰ったスクラップ：${r.carry}</div>
<div style="color:#aaa;margin-top:8px;">最高到達階：${state.bestFloor} 階</div>
`;
    document.getElementById("actions").innerHTML = "";
    btn("ホームへ戻る", goHome);
    document.getElementById("shop").innerHTML = "";
    return;
  }

  let logHTML = "";
  state.log.forEach((e, i) => {
    let cls = "";
    if(i===0)             cls += "log-new ";
    if(e.type==="damage") cls += "log-damage ";
    if(e.type==="scrap")  cls += "log-scrap ";
    if(e.type==="divider")cls += "log-divider ";
    if(e.type==="sub"){
      logHTML += `<div class="${cls}" style="padding-left:2em;color:#aaa;">→ ${e.text}</div>`;
    } else {
      logHTML += `<div class="${cls}">${e.text}</div>`;
    }
  });
  document.getElementById("log").innerHTML = logHTML;

  let a = document.getElementById("actions");
  a.innerHTML = "";

  switch(state.mode){
    case "home":
      btn("採掘開始", startRun);
      btn("名前変更", changeName);
      break;
    case "explore":
      btn("採掘する", next);
      break;
    case "event":
      btn("開ける",   openChest);
      btn("無視する", ignoreChest);
      break;
    case "event_vein":
      btn("掘る",       digVein);
      btn("無視して進む", ignoreEvent);
      break;
    case "event_mushroom":
      btn("食べる",     eatMushroom);
      btn("無視して進む", ignoreEvent);
      break;
    case "return":
      btn("帰還する", confirmReturn);
      btn("続行する", continueRun);
      break;
    case "dead":
      btn("帰還する", forceReturn);
      break;
  }

  let shopHTML = "";
  if(state.mode === "home"){
    shopHTML = `
<div>▼ショップ</div>
<button onclick="buyHp()">最大HP +1<br>（スクラップ ${getHpCost()}）</button>
<button onclick="buyPower()">採掘力 +1<br>（スクラップ ${getPowerCost()}）</button>
`;
  }
  document.getElementById("shop").innerHTML = shopHTML;
}

function btn(t, f){
  let b = document.createElement("button");
  b.innerText = t;
  b.onclick   = f;
  document.getElementById("actions").appendChild(b);
}

// --- 名前変更 ---
function changeName(){
  let n = prompt("名前入力");
  if(n){
    state.name = n;
    localStorage.setItem("playerName", n);
  }
  render();
}

// --- 採掘開始 ---
function startRun(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  state.mode  = "explore";
  addLog("採掘開始！");
  render();
}

// --- 採掘量計算 ---
function calcScrap(){
  let bonus    = Math.floor((state.floor-1)/10) + 1;
  let base     = state.power * bonus;
  let variance = Math.floor(base * (Math.random() - 0.5));
  return Math.max(1, base + variance);
}

// --- 探索 ---
function next(){
  state.floor++;

  if(state.floor % 10 === 0){
    addLog(`－－－ ${state.floor}階層 －－－`, "divider");
    state.mode = "return";
    render();
    return;
  }

  let r = Math.random();

  // 鉱脈：約10階に1回（確率10%）、コンテナより優先チェック
  if(r < 0.10){
    state.mode = "event_vein";
    addLog("鉱脈だ！だけど地盤が脆そうだ…");
    render();
    return;

  // キノコ：約8%
  } else if(r < 0.18){
    state.mode = "event_mushroom";
    addLog("謎のキノコだ！");
    render();
    return;

  } else if(r < 0.59){
    let g = calcScrap();
    state.scrap += g;
    addLog(`採掘した スクラップ +${g}`, "scrap");
  } else if(r < 0.79){
    let d = Math.floor(Math.random()*3) + 1;
    damage(d);
    addLog(`落石！ ${d} ダメージ`, "damage");
  } else {
    state.mode = "event";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  checkDeath();
  render();
}

// --- コンテナ ---
function openChest(){
  let r = Math.random();
  if(r < 0.6){
    let g = Math.floor(Math.random()*5) + 2;
    state.scrap += g;
    addLog(`資源を発見！ スクラップ +${g}`, "sub");
  } else {
    let d = Math.floor(Math.random()*5) + 2;
    damage(d);
    addLog(`トラップ作動！ ${d} ダメージ`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

function ignoreChest(){
  addLog("無視した", "sub");
  state.mode = "explore";
  render();
}

// --- 共通：無視して進む ---
function ignoreEvent(){
  addLog("無視した", "sub");
  state.mode = "explore";
  render();
}

// --- 鉱脈イベント ---
function digVein(){
  if(Math.random() < 0.5){
    let g = calcScrap() * 2;
    state.scrap += g;
    addLog(`鉱脈を掘り当てた！ スクラップ +${g}`, "sub");
  } else {
    let d = 3 + Math.floor(state.floor / 10);
    damage(d);
    addLog(`地盤が崩れた！ ${d} ダメージ`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- キノコイベント ---
function eatMushroom(){
  let r = Math.random();
  if(r < 0.40){
    damage(3);
    addLog("苦い！ 3 ダメージを受けた", "sub");
  } else if(r < 0.80){
    heal(3);
    addLog("甘い香り… HP +3 回復した", "sub");
  } else if(r < 0.90){
    let back = Math.min(2, state.floor - 1);
    state.floor -= back;
    addLog(`錯乱した！ ${back}階層戻された`, "sub");
  } else {
    let lost = Math.floor(state.scrap * 0.1);
    state.scrap = Math.max(0, state.scrap - lost);
    addLog(`錯乱した！ スクラップ ${lost} をばらまいた`, "sub");
  }
  checkDeath();
  if(state.mode !== "dead") state.mode = "explore";
  render();
}

// --- 死亡 ---
function checkDeath(){
  if(state.hp <= 0){
    addLog("HPが0になった…");
    state.mode = "dead";
  }
}

// --- 帰還 ---
function confirmReturn(){
  if(confirm("本当に帰還しますか？（スクラップの半分を持ち帰ります）")){
    state.mode = "result";  // returnモードを先に抜ける
    doReturn();
  }
}

function doReturn(){
  let carry = Math.floor(state.scrap / 2);
  state.totalScrap += carry;

  // 最高到達階を更新
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  saveAll();

  state.lastResult = { survived: true, floor: state.floor, carry };
  state.mode = "result";
  render();
}

function forceReturn(){
  // 最高到達階を更新
  if(state.floor > state.bestFloor) state.bestFloor = state.floor;
  saveAll();

  state.lastResult = { survived: false, floor: state.floor, carry: 0 };
  state.mode = "result";
  render();
}

function goHome(){
  state.hp    = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log   = [];
  state.lastResult = null;
  state.mode  = "home";
  render();
}

function continueRun(){
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// --- ショップ購入 ---
function buyHp(){
  let cost = getHpCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap  -= cost;
    state.maxHp++;
    state.hp++;          // 現在HPも+1（即時反映）
    state.upgrades.hp++;
    saveAll();
    render();
  }
}

function buyPower(){
  let cost = getPowerCost();
  if(state.totalScrap < cost){ alert("スクラップが足りない"); return; }
  if(confirm(`スクラップ ${cost} で購入しますか？`)){
    state.totalScrap   -= cost;
    state.power++;
    state.upgrades.power++;
    saveAll();
    render();
  }
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Nikotaya Mining Roguelike</title>
<style>
body {
  background-color: #111;
  color: #0f0;
  font-family: monospace;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-size: 32px;
}

h2 { font-size: 40px; }
#status { margin-bottom: 12px; font-size: 34px; }
#log { margin-bottom: 16px; font-size: 28px; }

#storage {
  margin-top: 16px;
  padding-top: 10px;
  border-top: 2px solid #0f0;
  color: #ffcc66;
  font-size: 28px;
}

#playerStatus {
  margin-top: 16px;
  padding-top: 10px;
  border-top: 2px solid #0f0;
  color: #0ff;
  font-size: 28px;
}

button {
  min-width: 180px;
  max-width: 240px;
  flex: 1;
  margin: 8px;
  padding: 20px 0;
  background: #222;
  color: #0f0;
  border: 2px solid #0f0;
  font-size: 28px;
}

#log div { margin-bottom: 6px; color: #fff; }
.log-new { font-weight: bold; }
.log-damage { color: #f55; }
.log-scrap { color: #ffcc66; }
.log-divider { color: #888; text-align: center; }

#top {
  height: 400px;
  overflow-y: auto;
  padding: 16px;
}

#bottom {
  flex: 1;
  border-top: 2px solid #0f0;
  padding: 16px;
  background: #111;
}

#actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}
</style>
</head>

<body>

<div id="top">
  <h2>Nikotaya Mining Roguelike</h2>
  <div id="status"></div>
  <div id="log"></div>
</div>

<div id="bottom">
  <div id="actions"></div>
  <div id="storage"></div>
  <div id="playerStatus"></div>
</div>

<script>
let state = {
  name: "プレイヤー",
  hp: 10,
  maxHp: 10,
  mp: 0,
  maxMp: 0,
  power: 1,
  skills: [],
  scrap: 0,
  totalScrap: 0,
  floor: 1,
  log: [],
  mode: "home"
};

// 永続読み込み
let savedScrap = localStorage.getItem("totalScrap");
if (savedScrap) state.totalScrap = parseInt(savedScrap) || 0;

let savedName = localStorage.getItem("playerName");
if (savedName) state.name = savedName;

// --- HP操作 ---
function damage(dmg) {
  state.hp = Math.max(0, state.hp - dmg);
}
function heal(amount) {
  state.hp = Math.min(state.hp + amount, state.maxHp);
}

// --- ログ ---
function addLog(text, type = "normal") {
  let prefix = (type === "divider") ? "" : `【${state.floor}階】`;
  state.log.unshift({ text: prefix + text, type });
  state.log = state.log.slice(0, 12);
}

// --- 描画 ---
function render() {
  document.getElementById("status").innerText =
    `HP:${state.hp}/${state.maxHp} | スクラップ:${state.scrap} | 現在地:${state.floor}階`;

  document.getElementById("storage").innerText =
    `倉庫：スクラップ ${state.totalScrap}`;

  document.getElementById("playerStatus").innerText =
`名前：${state.name}
HP：${state.hp}/${state.maxHp}
MP：${state.mp}/${state.maxMp}
採掘力：${state.power}
スキル：${state.skills.length ? state.skills.join(", ") : "なし"}`;

  let logHTML = "";
  state.log.forEach((entry, i) => {
    let cls = "";
    if (i === 0) cls += "log-new ";
    if (entry.type === "damage") cls += "log-damage ";
    if (entry.type === "scrap") cls += "log-scrap ";
    if (entry.type === "divider") cls += "log-divider ";
    logHTML += `<div class="${cls}">${entry.text}</div>`;
  });
  document.getElementById("log").innerHTML = logHTML;

  let actions = document.getElementById("actions");
  actions.innerHTML = "";

  switch (state.mode) {
    case "home":
      createButton("採掘開始", startRun);
      createButton("名前変更", changeName);
      break;

    case "explore":
      createButton("採掘する", next);
      break;

    case "event":
      createButton("開ける", openChest);
      createButton("無視する", ignoreChest);
      break;

    case "return":
      createButton("帰還する", doReturn);
      createButton("続行する", continueRun);
      break;

    case "dead":
      createButton("帰還する", forceReturn);
      break;
  }
}

function createButton(text, fn) {
  let b = document.createElement("button");
  b.innerText = text;
  b.onclick = fn;
  document.getElementById("actions").appendChild(b);
}

// --- 名前変更 ---
function changeName() {
  let n = prompt("名前を入力");
  if (n) {
    state.name = n;
    localStorage.setItem("playerName", n);
  }
  render();
}

// --- 開始 ---
function startRun() {
  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];
  state.mode = "explore";

  addLog("採掘開始！");
  render();
}

// --- 探索 ---
function next() {
  state.floor++;

  if (state.floor % 10 === 0) {
    addLog(`－－－ ${state.floor}階層 －－－`, "divider");
    state.mode = "return";
    render();
    return;
  }

  let r = Math.random();

  if (r < 0.5) {
    let gain = Math.floor(Math.random() * 3) + 1;
    state.scrap += gain;
    addLog(`採掘した スクラップ +${gain}`, "scrap");

  } else if (r < 0.75) {
    let dmg = Math.floor(Math.random() * 3) + 1;
    damage(dmg);
    addLog(`落石！ ${dmg} ダメージ`, "damage");

  } else {
    state.mode = "event";
    addLog("コンテナを発見した！");
    render();
    return;
  }

  checkDeath();
  render();
}

// --- コンテナ ---
function openChest() {
  let r = Math.random();

  if (r < 0.6) {
    let gain = Math.floor(Math.random() * 5) + 2;
    state.scrap += gain;
    addLog(`資源を発見！ スクラップ +${gain}`, "scrap");

  } else {
    let dmg = Math.floor(Math.random() * 5) + 2;
    damage(dmg);
    addLog(`トラップ作動！ ${dmg} ダメージ`, "damage");
  }

  checkDeath();
  state.mode = "explore";
  render();
}

function ignoreChest() {
  addLog("コンテナを無視した");
  state.mode = "explore";
  render();
}

// --- 死亡 ---
function checkDeath() {
  if (state.hp <= 0) {
    addLog("HPが0になった…");
    state.mode = "dead";
  }
}

// --- 帰還 ---
function doReturn() {
  let carry = Math.floor(state.scrap / 2);

  state.totalScrap += carry;
  localStorage.setItem("totalScrap", state.totalScrap);

  addLog(`帰還した。スクラップ${carry}を持ち帰った`, "scrap");

  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode = "home";
  render();
}

function forceReturn() {
  addLog("撤退した…");

  state.hp = state.maxHp;
  state.scrap = 0;
  state.floor = 1;
  state.log = [];

  state.mode = "home";
  render();
}

function continueRun() {
  addLog("さらに深く潜る…");
  state.mode = "explore";
  render();
}

// 初期表示
render();
</script>

</body>
</html>
